<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>波波自我介紹 - Day 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sky-top: #a8e6ff;
    --sky-bot: #e0f7fa;
    --grass: #7ec850;
    --grass-dark: #5a9e34;
    --btn-bg: #ffe066;
    --btn-border: #f5c542;
    --btn-shadow: #d4a017;
    --dialogue-bg: rgba(255,255,255,0.92);
    --accent: #ff6b6b;
    --celebrate: #ffd700;
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'Noto Sans TC', sans-serif;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== SCENE ===== */
  .scene {
    position: relative;
    width: 100%; height: 100%;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 60%, var(--grass) 60%, var(--grass-dark) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.7;
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute; background: white; border-radius: 50%;
  }
  .cloud-1 { width: 90px; height: 30px; top: 8%; left: 10%; animation: drift 20s linear infinite; }
  .cloud-1::before { width: 40px; height: 40px; top: -20px; left: 15px; }
  .cloud-1::after { width: 50px; height: 35px; top: -15px; left: 35px; }
  .cloud-2 { width: 70px; height: 24px; top: 14%; right: 15%; animation: drift 28s linear infinite reverse; }
  .cloud-2::before { width: 35px; height: 30px; top: -15px; left: 10px; }
  .cloud-2::after { width: 40px; height: 28px; top: -12px; left: 28px; }
  .cloud-3 { width: 60px; height: 20px; top: 5%; left: 55%; animation: drift 24s linear infinite; }
  .cloud-3::before { width: 30px; height: 28px; top: -14px; left: 8px; }
  .cloud-3::after { width: 35px; height: 24px; top: -10px; left: 22px; }

  @keyframes drift {
    from { transform: translateX(-120px); }
    to   { transform: translateX(calc(100vw + 120px)); }
  }

  /* Flowers on grass */
  .flowers {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
    pointer-events: none; overflow: hidden;
  }
  .flower {
    position: absolute; font-size: 1.4rem;
    animation: sway 3s ease-in-out infinite alternate;
  }
  @keyframes sway { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }

  /* ===== CHARACTER ===== */
  .character-wrap {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    width: min(55vw, 55vh);
    z-index: 10;
    transition: transform 0.6s cubic-bezier(.34,1.56,.64,1);
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.18));
  }
  .character-wrap.visible { transform: translateX(-50%) scale(1); }
  .character-wrap.bounce  { animation: heroBounce 0.5s ease; }
  .character-wrap.celebrate { animation: wiggle 0.4s ease 3; }

  .character-wrap img {
    width: 100%; height: auto;
    border-radius: 18px;
  }

  @keyframes heroBounce {
    0%,100% { transform: translateX(-50%) scale(1); }
    40%     { transform: translateX(-50%) scale(1.08) translateY(-12px); }
  }
  @keyframes wiggle {
    0%,100% { transform: translateX(-50%) scale(1) rotate(0); }
    25%     { transform: translateX(-50%) scale(1.05) rotate(-6deg); }
    75%     { transform: translateX(-50%) scale(1.05) rotate(6deg); }
  }

  /* ===== DIALOGUE BUBBLE ===== */
  .dialogue {
    position: absolute;
    top: 6%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: var(--dialogue-bg);
    border-radius: 28px;
    padding: 18px 28px;
    max-width: 85vw;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    z-index: 20;
    text-align: center;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0;
  }
  .dialogue.visible { transform: translateX(-50%) scale(1); opacity: 1; }
  .dialogue p {
    font-size: clamp(1.3rem, 4.5vw, 2rem);
    font-weight: 700;
    color: #333;
    line-height: 1.5;
  }
  .dialogue .speaker {
    font-size: 0.85rem;
    color: #999;
    margin-bottom: 4px;
  }
  /* Tail */
  .dialogue::after {
    content: '';
    position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
    border: 14px solid transparent;
    border-top-color: var(--dialogue-bg);
  }

  /* ===== CHOICES ===== */
  .choices {
    position: absolute;
    bottom: 4%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  .choices.visible { opacity: 1; pointer-events: auto; }

  .choice-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    font-weight: 700;
    padding: 14px 28px;
    border: 4px solid var(--btn-border);
    border-radius: 50px;
    background: var(--btn-bg);
    color: #5a3e00;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--btn-shadow);
    transform: translateY(0);
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .choice-btn::before {
    content: ''; position: absolute; top: 4px; left: 12px; right: 12px; height: 30%;
    background: rgba(255,255,255,0.4); border-radius: 50px;
  }
  .choice-btn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 var(--btn-shadow);
  }
  .choice-btn.selected {
    background: #90ee90;
    border-color: #4caf50;
    box-shadow: 0 5px 0 #388e3c;
    animation: popIn 0.35s ease;
  }
  @keyframes popIn {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* Age buttons - styled like birthday badges */
  .choice-btn.age-btn { border-radius: 50%; width: 72px; height: 72px; padding: 0; font-size: 1.8rem; }

  /* ===== CONFETTI ===== */
  .confetti-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 100; overflow: hidden;
    display: none;
  }
  .confetti-container.active { display: block; }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    top: -20px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* ===== FINAL BANNER ===== */
  .final-banner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffecd2);
    border-radius: 30px;
    padding: 30px 40px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    z-index: 50;
    transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .final-banner.visible { transform: translate(-50%, -50%) scale(1); }
  .final-banner h1 { font-size: clamp(1.5rem, 5vw, 2.5rem); color: #d63384; }
  .final-banner p  { font-size: clamp(1rem, 3vw, 1.4rem); color: #6d4c41; margin-top: 8px; }
  .final-banner .stars { font-size: 2.5rem; margin-top: 10px; }

  /* ===== TAP TO START ===== */
  .start-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    cursor: pointer;
  }
  .start-overlay .start-box {
    background: white;
    border-radius: 30px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    animation: pulse 2s ease-in-out infinite;
  }
  .start-overlay h2 { font-size: 2rem; color: #333; }
  .start-overlay p  { font-size: 1.1rem; color: #888; margin-top: 6px; }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.04); }
  }

  /* Utility */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- TAP TO START (needed for audio context) -->
<div class="start-overlay" id="startOverlay">
  <div class="start-box">
    <h2>👆 撳呢度開始</h2>
    <p>Tap to start</p>
  </div>
</div>

<!-- MAIN SCENE -->
<div class="scene" id="scene">
  <!-- Clouds -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <!-- Flowers -->
  <div class="flowers" id="flowers"></div>

  <!-- Character -->
  <div class="character-wrap" id="character">
    <img src="img/bobo_panda.png" alt="波波">
  </div>

  <!-- Dialogue -->
  <div class="dialogue" id="dialogue">
    <div class="speaker" id="speaker"></div>
    <p id="dialogueText"></p>
  </div>

  <!-- Choices -->
  <div class="choices" id="choices"></div>

  <!-- Confetti -->
  <div class="confetti-container" id="confetti"></div>

  <!-- Final Banner -->
  <div class="final-banner" id="finalBanner">
    <h1 id="finalTitle"></h1>
    <p id="finalSub"></p>
    <div class="stars">⭐⭐⭐</div>
  </div>
</div>

<script>
// ===== Elements =====
const $ = id => document.getElementById(id);
const character  = $('character');
const dialogue   = $('dialogue');
const dText      = $('dialogueText');
const speaker    = $('speaker');
const choices    = $('choices');
const confetti   = $('confetti');
const finalBanner= $('finalBanner');

let childName = '';
let childAge  = '';

// ===== Flowers =====
(() => {
  const f = $('flowers');
  const flowers = ['🌸','🌼','🌺','🌻','🌷','💐'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('span');
    el.className = 'flower';
    el.textContent = flowers[i % flowers.length];
    el.style.left = (5 + Math.random() * 90) + '%';
    el.style.bottom = (2 + Math.random() * 18) + '%';
    el.style.animationDelay = (Math.random() * 2) + 's';
    el.style.fontSize = (1 + Math.random() * 0.8) + 'rem';
    f.appendChild(el);
  }
})();

// ===== Speech =====
function speak(text, lang = 'zh-HK') {
  return new Promise(resolve => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.85;
    u.pitch = 1.3;
    // Try to find a Cantonese / Chinese voice
    const voices = speechSynthesis.getVoices();
    const zhVoice = voices.find(v => v.lang.startsWith('zh')) || null;
    if (zhVoice) u.voice = zhVoice;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

// ===== Audio helpers =====
function playAudio(src) {
  return new Promise(resolve => {
    const a = new Audio(src);
    a.onended = resolve;
    a.onerror = resolve;
    a.play().catch(resolve);
  });
}

// ===== Delay =====
const wait = ms => new Promise(r => setTimeout(r, ms));

// ===== Show/Hide helpers =====
function showDialogue(speakerName, text) {
  speaker.textContent = speakerName;
  dText.textContent = text;
  dialogue.classList.add('visible');
}
function hideDialogue() { dialogue.classList.remove('visible'); }

function showChoices(items, cssClass = '') {
  choices.innerHTML = '';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (cssClass ? ' ' + cssClass : '');
    btn.textContent = item.label;
    btn.onclick = () => {
      // Mark selected
      choices.querySelectorAll('.choice-btn').forEach(b => b.onclick = null);
      btn.classList.add('selected');
      item.action();
    };
    choices.appendChild(btn);
  });
  choices.classList.add('visible');
}
function hideChoices() { choices.classList.remove('visible'); }

function bounceCharacter() { character.classList.add('bounce'); setTimeout(() => character.classList.remove('bounce'), 600); }
function celebrateCharacter() { character.classList.add('celebrate'); setTimeout(() => character.classList.remove('celebrate'), 1400); }

// ===== Confetti =====
function fireConfetti() {
  confetti.classList.add('active');
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[i % colors.length];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    confetti.appendChild(el);
  }
  setTimeout(() => { confetti.classList.remove('active'); confetti.innerHTML = ''; }, 4500);
}

// ===== STORY SEQUENCE =====
async function startStory() {
  // Preload voices
  speechSynthesis.getVoices();
  await wait(300);

  // 1. Character enters
  character.classList.add('visible');
  await wait(700);
  bounceCharacter();

  // 2. BoBo introduces itself
  showDialogue('🐼 波波', '你好呀！我係波波！');
  await speak('你好呀！我係波波！');
  await wait(600);

  // 3. Ask name
  showDialogue('🐼 波波', '你叫咩名呀？');
  await speak('你叫咩名呀？');
  await wait(400);

  // 4. Name choices
  showChoices([
    { label: '🏷️ 小明', action: () => pickName('小明') },
    { label: '🏷️ 小美', action: () => pickName('小美') },
    { label: '🏷️ 小樂', action: () => pickName('小樂') },
  ]);
}

async function pickName(name) {
  childName = name;
  hideChoices();
  bounceCharacter();

  // React
  showDialogue('🐼 波波', `${name}！好好聽嘅名呀！`);
  await speak(`${name}，好好聽嘅名呀！`);
  await wait(600);

  // 5. Ask age
  showDialogue('🐼 波波', `${name}，你幾多歲呀？`);
  await speak(`${name}，你幾多歲呀？`);
  await wait(400);

  showChoices([
    { label: '3', action: () => pickAge('3') },
    { label: '4', action: () => pickAge('4') },
    { label: '5', action: () => pickAge('5') },
    { label: '6', action: () => pickAge('6') },
  ], 'age-btn');
}

async function pickAge(age) {
  childAge = age;
  hideChoices();
  celebrateCharacter();

  showDialogue('🐼 波波', `${age}歲！好叻呀！`);
  await speak(`${age}歲！好叻呀！`);
  await wait(500);

  // 6. Recap
  showDialogue('🐼 波波', `我記住喇！你係${childName}，${childAge}歲！`);
  await speak(`我記住喇！你係${childName}，${childAge}歲！`);
  await wait(400);

  // 7. Celebration
  showDialogue('🐼 波波', '我哋做咗好朋友喇！🎉');
  await speak('我哋做咗好朋友喇！');
  await wait(300);

  hideDialogue();
  fireConfetti();
  celebrateCharacter();
  await wait(800);

  // Final banner
  $('finalTitle').textContent = `🎉 ${childName}，歡迎你！`;
  $('finalSub').textContent = `波波同你做好朋友喇！明天再見！`;
  finalBanner.classList.add('visible');
}

// ===== START =====
$('startOverlay').onclick = () => {
  $('startOverlay').style.display = 'none';
  startStory();
};

// Preload voices on page load
window.speechSynthesis && speechSynthesis.onvoiceschanged === undefined || (speechSynthesis.onvoiceschanged = () => {});
</script>
</body>
</html>
