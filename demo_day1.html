<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>波波學堂 - Day 1</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans HK', sans-serif; }
body {
  background: linear-gradient(180deg, #87CEEB 0%, #B0E0FF 40%, #90EE90 60%, #228B22 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative;
}

/* Clouds */
.cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.85; }
.cloud::before, .cloud::after { content: ''; background: white; border-radius: 50%; position: absolute; }
.cloud1 { width: 120px; height: 40px; top: 8%; left: 10%; animation: drift 20s linear infinite; }
.cloud1::before { width: 60px; height: 60px; top: -30px; left: 20px; }
.cloud1::after { width: 40px; height: 40px; top: -20px; left: 60px; }
.cloud2 { width: 100px; height: 35px; top: 14%; right: 15%; animation: drift 25s linear infinite reverse; }
.cloud2::before { width: 50px; height: 50px; top: -25px; left: 15px; }
.cloud2::after { width: 35px; height: 35px; top: -18px; left: 50px; }
.cloud3 { width: 80px; height: 30px; top: 5%; left: 50%; animation: drift 18s linear infinite; }
.cloud3::before { width: 45px; height: 45px; top: -22px; left: 10px; }
.cloud3::after { width: 30px; height: 30px; top: -15px; left: 40px; }
@keyframes drift { from { transform: translateX(-20px); } to { transform: translateX(20px); } }

/* Character */
#character {
  display: none;
  width: auto; height: 55vh; max-height: 400px;
  border-radius: 20px;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,0.35));
  position: relative; z-index: 2;
  margin-top: -5vh;
}
#character.show {
  display: block;
  animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes bounceIn {
  0% { transform: scale(0) translateY(100px); opacity: 0; }
  60% { transform: scale(1.1) translateY(-10px); opacity: 1; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

/* Speech bubble */
#bubble {
  display: none;
  background: white; border-radius: 20px; padding: 16px 22px;
  position: relative; z-index: 3;
  max-width: 85vw; margin-top: 10px;
  font-size: 1.3rem; font-weight: bold; color: #333;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  text-align: center; line-height: 1.5;
}
#bubble::before {
  content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
  border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 14px solid white;
}

/* Buttons */
#choices { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 15px; z-index: 3; }
.choice-btn {
  background: #FF6B6B; color: white; border: none; border-radius: 16px;
  padding: 14px 28px; font-size: 1.2rem; font-weight: bold;
  cursor: pointer; min-width: 100px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: transform 0.15s;
}
.choice-btn:active { transform: scale(0.93); }
.choice-btn:nth-child(2) { background: #4ECDC4; }
.choice-btn:nth-child(3) { background: #FFD93D; color: #333; }

/* Start */
#startBtn {
  background: #FF6B6B; color: white; border: none; border-radius: 50%;
  width: 140px; height: 140px; font-size: 1.6rem; font-weight: bold;
  cursor: pointer; z-index: 5;
  box-shadow: 0 6px 25px rgba(255,107,107,0.5);
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

/* Confetti */
.confetti {
  position: fixed; width: 10px; height: 10px; top: -10px; z-index: 10;
  animation: fall 3s linear forwards;
}
@keyframes fall {
  to { top: 110vh; transform: rotate(720deg); }
}
</style>
</head>
<body>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<button id="startBtn" onclick="startStory()">開始！</button>
<img id="character" src="bobo_panda.png" alt="BoBo">
<div id="bubble"></div>
<div id="choices"></div>

<script>
let playerName = '';

function speak(text) {
  return new Promise(resolve => {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-HK'; u.rate = 0.85; u.pitch = 1.2;
    u.onend = resolve;
    u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

function showBubble(text) {
  const b = document.getElementById('bubble');
  b.style.display = 'block';
  b.textContent = text;
}

function showChoices(opts, callback) {
  const c = document.getElementById('choices');
  c.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = o;
    btn.onclick = () => { c.innerHTML = ''; callback(o); };
    c.appendChild(btn);
  });
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function confetti() {
  const colors = ['#FF6B6B','#4ECDC4','#FFD93D','#A78BFA','#F472B6','#34D399'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.animationDelay = Math.random() * 1.5 + 's';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    document.body.appendChild(c);
  }
}

async function startStory() {
  document.getElementById('startBtn').style.display = 'none';
  const ch = document.getElementById('character');
  ch.classList.add('show');

  await delay(800);
  showBubble('你好呀！我係波波！🐼');
  await speak('你好呀！我係波波！');
  await delay(500);

  // Ask name
  showBubble('你叫咩名呀？😊');
  await speak('你叫咩名呀？');
  showChoices(['小明', '小紅', '小天'], async (name) => {
    playerName = name;
    showBubble(name + '！好靚嘅名呀！✨');
    await speak(name + '！好靚嘅名呀！');
    await delay(500);
    askAge();
  });
}

async function askAge() {
  showBubble(playerName + '，你幾歲呀？🎂');
  await speak(playerName + '，你幾歲呀？');
  showChoices(['3歲', '4歲', '5歲'], async (age) => {
    showBubble('哇！' + age + '！你好叻呀！🌟');
    await speak('哇！' + age + '！你好叻呀！');
    await delay(500);
    celebrate();
  });
}

async function celebrate() {
  showBubble('太好喇！我哋一齊玩啦！🎉🎊');
  await speak('太好喇！我哋一齊玩啦！');
  confetti();
}
</script>
</body>
</html>
