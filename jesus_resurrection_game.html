<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
  <title>耶穌復活</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:system-ui,Arial,sans-serif;
      background:#1a1a2e;
      min-height:100vh;
      overflow:hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    /* ── NAV BAR ── */
    .navbar{
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 14px;
      background:rgba(0,0,0,0.35);
    }
    .nav-icon{
      width:44px;height:44px;border-radius:12px;
      background:rgba(255,255,255,0.15);
      border:2px solid rgba(255,255,255,0.3);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;cursor:pointer;
      transition:transform 0.15s,background 0.15s;
    }
    .nav-icon:active{transform:scale(0.92);background:rgba(255,255,255,0.3)}
    .lang-menu{
      position:absolute;top:58px;right:14px;
      background:rgba(20,20,40,0.97);
      border:2px solid rgba(255,215,0,0.5);
      border-radius:14px;
      padding:6px;z-index:200;
      display:none;flex-direction:column;gap:4px;
    }
    .lang-menu.show{display:flex}
    .lang-btn{
      padding:10px 18px;border-radius:10px;
      background:rgba(255,255,255,0.1);border:none;
      color:#fff;font-size:15px;cursor:pointer;
      text-align:left;
    }
    .lang-btn:active{background:rgba(255,215,0,0.35)}
    .lang-btn.selected{background:rgba(255,215,0,0.3);color:#FFD700;font-weight:700}
    /* ── PROGRESS DOTS ── */
    .progress{
      position:fixed;top:68px;left:50%;transform:translateX(-50%);
      display:flex;gap:8px;z-index:100;
    }
    .pdot{
      width:14px;height:14px;border-radius:50%;
      background:rgba(255,255,255,0.25);
      transition:all 0.4s;
    }
    .pdot.done{background:#7bd389}
    .pdot.active{background:#FFD700;box-shadow:0 0 8px #FFD700}
    /* ── SCENE ── */
    .scene{
      position:fixed;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
    }
    .scene img.bg{
      position:absolute;inset:0;
      width:100%;height:100%;
      object-fit:cover;
    }
    /* Dark overlay so tappable items pop */
    .scene::after{
      content:'';position:absolute;inset:0;
      background:rgba(0,0,0,0.15);pointer-events:none;
    }
    /* ── TAPPABLE SPOTS ── */
    .spot{
      position:absolute;
      border-radius:50%;
      cursor:pointer;
      z-index:10;
      transition:transform 0.2s;
    }
    .spot::before{
      content:'';position:absolute;inset:-6px;
      border-radius:50%;border:3px solid rgba(255,215,0,0);
      animation:spotPulse 2s ease-in-out infinite;
    }
    .spot:not(.done):active{transform:scale(1.2)}
    .spot.done{
      background:rgba(100,220,100,0.5)!important;
      border-color:#7bd389!important;
      pointer-events:none;
    }
    .spot.done::before{display:none}
    @keyframes spotPulse{
      0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.5)}
      50%{box-shadow:0 0 0 12px rgba(255,215,0,0)}
    }
    /* ── CELEBRATION OVERLAY ── */
    #celebrate{
      position:fixed;inset:0;z-index:300;
      display:none;flex-direction:column;
      align-items:center;justify-content:center;
      background:rgba(0,0,0,0.7);
    }
    #celebrate.show{display:flex}
    .cel-icon{
      font-size:90px;animation:celBounce 0.6s ease;
    }
    @keyframes celBounce{
      0%{transform:scale(0)}100%{transform:scale(1)}
    }
    .cel-glow{
      position:absolute;width:220px;height:220px;
      border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,0.5),transparent);
      animation:celGlow 1.5s ease-in-out infinite alternate;
    }
    @keyframes celGlow{
      from{transform:scale(0.8);opacity:0.6}
      to{transform:scale(1.3);opacity:1}
    }
    /* ── ADVANCE HINT ── */
    #advance{
      position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
      z-index:300;display:none;
      flex-direction:column;align-items:center;gap:10px;
    }
    #advance.show{display:flex}
    .adv-glow{
      width:90px;height:90px;border-radius:50%;
      background:radial-gradient(circle,#FFD700,transparent);
      animation:advPulse 1s ease-in-out infinite;
    }
    @keyframes advPulse{
      0%,100%{transform:scale(1);opacity:0.8}
      50%{transform:scale(1.3);opacity:1}
    }
    .adv-arrow{
      font-size:36px;color:#FFD700;
      animation:advBounce 0.7s ease-in-out infinite;
    }
    @keyframes advBounce{
      0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}
    }
    /* ── FINAL CELEBRATION ── */
    #final{
      position:fixed;inset:0;z-index:400;
      display:none;flex-direction:column;
      align-items:center;justify-content:center;
      background:linear-gradient(135deg,#1a1a2e,#2a1a3e,#1a2a1a);
    }
    #final.show{display:flex}
    .final-stars{
      position:absolute;inset:0;overflow:hidden;pointer-events:none;
    }
    .star{
      position:absolute;font-size:28px;
      animation:starFall linear infinite;
    }
    @keyframes starFall{
      0%{transform:translateY(-40px) rotate(0deg);opacity:1}
      100%{transform:translateY(110vh) rotate(360deg);opacity:0.3}
    }
    .final-content{
      position:relative;z-index:10;
      display:flex;flex-direction:column;align-items:center;gap:20px;
      text-align:center;
    }
    .final-title{
      font-size:52px;animation:finalZoom 0.8s ease;
    }
    @keyframes finalZoom{
      0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}
    }
    .final-sub{font-size:28px;color:#FFD700}
    .final-restart{
      margin-top:10px;
      padding:16px 32px;border-radius:20px;
      background:#FFD700;color:#1a1a2e;
      border:none;font-size:20px;font-weight:700;
      cursor:pointer;
    }
    .final-restart:active{transform:scale(0.95)}
    /* ── SOUND ICONS (visual feedback) ── */
    .sound-wave{
      position:fixed;bottom:20px;right:16px;
      font-size:26px;opacity:0.7;z-index:90;
      animation:soundWave 1.5s ease-in-out infinite;
      pointer-events:none;display:none;
    }
    .sound-wave.playing{display:block}
    @keyframes soundWave{
      0%,100%{transform:scale(1)}50%{transform:scale(1.3)}
    }
    /* ── SPOT SIZE BY DAY ── */
    .spot-s{width:60px;height:60px}
    .spot-m{width:80px;height:80px}
    .spot-l{width:100px;height:100px}
    /* ── DAY-SPECIFIC THEMES ── */
    body.d3{background:#1a0505}
    body.d4{background:#05051a}
    body.d5{background:#1a1a00}
    /* ── NARRATION BANNER (brief visual cue) ── */
    .day-emoji{
      position:fixed;top:90px;left:50%;transform:translateX(-50%);
      font-size:70px;z-index:90;opacity:0;transition:opacity 0.5s;
      text-shadow:0 0 20px rgba(255,215,0,0.8);
      pointer-events:none;
    }
    .day-emoji.show{opacity:1}
  </style>
</head>
<body>

<!-- NAV: home + language -->
<div class="navbar">
  <div class="nav-icon" onclick="goHome()" title="首頁">🏠</div>
  <div class="nav-icon" onclick="toggleLang()" id="langIcon" title="語言">🌍</div>
</div>
<div class="lang-menu" id="langMenu">
  <button class="lang-btn selected" onclick="setLang('zhHK')">🇭🇰 粵語</button>
  <button class="lang-btn" onclick="setLang('zhCN')">🇨🇳 普通話</button>
  <button class="lang-btn" onclick="setLang('enUS')">🇺🇸 English</button>
  <button class="lang-btn" onclick="setLang('jaJP')">🇯🇵 日本語</button>
</div>

<!-- Progress dots -->
<div class="progress" id="progress"></div>

<!-- Day emoji cue -->
<div class="day-emoji" id="dayEmoji"></div>

<!-- Sound wave indicator -->
<div class="sound-wave" id="soundWave">🔊</div>

<!-- SCENES (one per day) -->
<!-- DAY 1: Palm Sunday — tap the donkey -->
<div class="scene" id="scene-1">
  <img class="bg" src="https://raw.githubusercontent.com/ai-lish/preschool/main/img/jesus_resurrection/scene1_palm.png" alt="">
  <!-- Donkey spot -->
  <div class="spot spot-l" id="spot-1"
    style="top:42%;left:35%;background:rgba(255,215,0,0.25);border:4px solid rgba(255,215,0,0.7)"
    onclick="day1Click()">
  </div>
</div>

<!-- DAY 2: Last Supper — tap bread AND cup -->
<div class="scene" id="scene-2" style="display:none">
  <img class="bg" src="https://raw.githubusercontent.com/ai-lish/preschool/main/img/jesus_resurrection/scene2_supper.png" alt="">
  <div class="spot spot-m" id="spot-2a"
    style="top:38%;left:30%;background:rgba(255,215,0,0.25);border:4px solid rgba(255,215,0,0.7)"
    onclick="day2a()">
  </div>
  <div class="spot spot-m" id="spot-2b"
    style="top:38%;left:55%;background:rgba(255,215,0,0.25);border:4px solid rgba(255,215,0,0.7)"
    onclick="day2b()">
  </div>
</div>

<!-- DAY 3: Cross — tap cross THEN heart -->
<div class="scene" id="scene-3" style="display:none">
  <img class="bg" src="https://raw.githubusercontent.com/ai-lish/preschool/main/img/jesus_resurrection/scene3_cross.png" alt="">
  <div class="spot spot-l" id="spot-3a"
    style="top:28%;left:40%;background:rgba(255,215,0,0.2);border:4px solid rgba(255,215,0,0.6)"
    onclick="day3a()">
  </div>
  <div class="spot spot-m" id="spot-3b"
    style="top:18%;left:42%;background:rgba(255,100,100,0.3);border:4px solid rgba(255,100,100,0.7)"
    onclick="day3b()">
  </div>
</div>

<!-- DAY 4: Empty Tomb — tap stone -->
<div class="scene" id="scene-4" style="display:none">
  <img class="bg" src="https://raw.githubusercontent.com/ai-lish/preschool/main/img/jesus_resurrection/scene4_tomb.png" alt="">
  <div class="spot spot-l" id="spot-4"
    style="top:32%;left:58%;background:rgba(255,215,0,0.2);border:4px solid rgba(255,215,0,0.6)"
    onclick="day4Click()">
  </div>
</div>

<!-- DAY 5: Resurrection — tap angel -->
<div class="scene" id="scene-5" style="display:none">
  <img class="bg" src="https://raw.githubusercontent.com/ai-lish/preschool/main/img/jesus_resurrection/scene5_appear.png" alt="">
  <div class="spot spot-l" id="spot-5"
    style="top:28%;left:48%;background:rgba(255,255,255,0.2);border:4px solid rgba(255,255,255,0.7)"
    onclick="day5Click()">
  </div>
</div>

<!-- CELEBRATION overlay (per-day) -->
<div id="celebrate">
  <div class="cel-glow"></div>
  <div class="cel-icon" id="celIcon">⭐</div>
</div>

<!-- ADVANCE overlay (tap to go next) -->
<div id="advance" onclick="nextDay()">
  <div class="adv-glow"></div>
  <div class="adv-arrow">▶</div>
</div>

<!-- FINAL celebration -->
<div id="final">
  <div class="final-stars" id="finalStars"></div>
  <div class="final-content">
    <div class="final-title">🎉</div>
    <div class="final-sub">耶穌活喇！</div>
    <button class="final-restart" onclick="restart()">再玩一次 🔄</button>
    <button class="final-restart" style="background:rgba(255,255,255,0.15);color:#fff;margin-top:8px" onclick="goHome()">返去首頁 🏠</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════
   CONSTANTS
═══════════════════════════════════ */
const BASE = 'https://raw.githubusercontent.com/ai-lish/preschool/main';
const T = {
  zhHK: {d1Emoji:'🐴',d2Emoji:'🍞',d3Emoji:'✝️',d4Emoji:'💎',d5Emoji:'👼',final:'耶穌活喇！'},
  zhCN: {d1Emoji:'🐴',d2Emoji:'🍞',d3Emoji:'✝️',d4Emoji:'💎',d5Emoji:'👼',final:'耶穌活了！'},
  enUS: {d1Emoji:'🐴',d2Emoji:'🍞',d3Emoji:'✝️',d4Emoji:'💎',d5Emoji:'👼',final:'Jesus is Alive!'},
  jaJP: {d1Emoji:'🐴',d2Emoji:'🍞',d3Emoji:'✝️',d4Emoji:'💎',d5Emoji:'👼',final:'イエスは生きておられます！'},
};
const AUDIO_KEYS = {
  1:{n:'r1Narr',s:'r1Success',f:'r1Fail'},
  2:{n:'r2Narr',s:'r2Success',f:'r2Fail'},
  3:{n:'r3Narr',s:'r3Success',f:'r3Fail'},
  4:{n:'r4Narr',s:'r4Success',f:'r4Fail'},
  5:{n:'r5Narr',s:'r5Success',f:'r5Fail'},
};
const CELEMOJIS = ['⭐','🌟','✨','🎉','💫'];

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let currentDay = 1;
let completedDays = new Set();
let d2a=false,d2b=false;
let d3a=false,d3b=false;
let audioLock = false; // prevent double-play

/* ═══════════════════════════════════
   AUDIO
═══════════════════════════════════ */
function audioUrl(key) {
  return BASE + '/audio/jesus_resurrection/' + key + '_' + lang + '.mp3';
}

function playAudio(key) {
  if (audioLock) return;
  audioLock = true;
  const a = new Audio(audioUrl(key));
  a.play().catch(()=>{});
  document.getElementById('soundWave').classList.add('playing');
  a.onended = () => {
    audioLock = false;
    document.getElementById('soundWave').classList.remove('playing');
  };
  // Auto-unlock after 8s fallback
  setTimeout(()=>{ audioLock = false; document.getElementById('soundWave').classList.remove('playing'); }, 8000);
}

/* ═══════════════════════════════════
   NAV
═══════════════════════════════════ */
let lang = 'zhHK';
const langNames = {zhHK:'zhHK',zhCN:'zhCN',enUS:'enUS',jaJP:'jaJP'};

function toggleLang() {
  document.getElementById('langMenu').classList.toggle('show');
}
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.includes(
      l==='zhHK'?'粵':l==='zhCN'?'普通':l==='enUS'?'Eng':l==='jaJP'?'日本':''
    ));
  });
  document.getElementById('langMenu').classList.remove('show');
  // Re-render current day with new lang narration
  showDay(currentDay);
}
function goHome() {
  window.location.href = 'index.html';
}

/* ═══════════════════════════════════
   PROGRESS DOTS
═══════════════════════════════════ */
function renderDots() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  for (let i=1;i<=5;i++) {
    const d = document.createElement('div');
    d.className = 'pdot';
    if (completedDays.has(i)) d.classList.add('done');
    if (i===currentDay) d.classList.add('active');
    el.appendChild(d);
  }
}

/* ═══════════════════════════════════
   SCENE SHOW/HIDE
═══════════════════════════════════ */
function showDay(n) {
  for (let i=1;i<=5;i++) {
    document.getElementById('scene-'+i).style.display = (i===n)?'flex':'none';
  }
  document.body.className = n===3?'d3':n===4?'d4':n===5?'d5':'';
  currentDay = n;
  renderDots();
  // Show emoji briefly
  const emojis = T[lang];
  const emoji = ['',emojis.d1Emoji,emojis.d2Emoji,emojis.d3Emoji,emojis.d4Emoji,emojis.d5Emoji][n];
  const de = document.getElementById('dayEmoji');
  de.textContent = emoji;
  de.classList.add('show');
  setTimeout(()=>de.classList.remove('show'), 2500);
  // Auto-play narration
  setTimeout(()=>playAudio(AUDIO_KEYS[n].n), 600);
}

/* ═══════════════════════════════════
   CELEBRATION
═══════════════════════════════════ */
function celebrate(day) {
  const icons = ['⭐','🌟','✨','🎉','💫'];
  const icon = icons[Math.floor(Math.random()*icons.length)];
  document.getElementById('celIcon').textContent = icon;
  document.getElementById('celebrate').classList.add('show');
  playAudio(AUDIO_KEYS[day].s);
  setTimeout(()=>{
    document.getElementById('celebrate').classList.remove('show');
    completedDays.add(day);
    renderDots();
    if (day < 5) {
      showAdvance();
    } else {
      showFinal();
    }
  }, 2200);
}

function showAdvance() {
  document.getElementById('advance').classList.add('show');
}

function nextDay() {
  document.getElementById('advance').classList.remove('show');
  showDay(currentDay + 1);
}

/* ═══════════════════════════════════
   FINAL
═══════════════════════════════════ */
function showFinal() {
  // Stars confetti
  const starsEl = document.getElementById('finalStars');
  starsEl.innerHTML = '';
  const emojis = ['⭐','🌟','✨','🌈','💫','🎉'];
  for (let i=0;i<20;i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left = Math.random()*100+'%';
    s.style.animationDuration = (2+Math.random()*3)+'s';
    s.style.animationDelay = Math.random()*2+'s';
    starsEl.appendChild(s);
  }
  document.getElementById('final').classList.add('show');
}

function restart() {
  completedDays.clear();
  d2a=d2b=d3a=d3b=false;
  // Reset spots
  ['spot-1','spot-2a','spot-2b','spot-3a','spot-3b','spot-4','spot-5'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.classList.remove('done');
  });
  document.getElementById('final').classList.remove('show');
  showDay(1);
}

/* ═══════════════════════════════════
   DAY-SPECIFIC ACTIONS
═══════════════════════════════════ */
// Day 1 — one spot: donkey
function day1Click() {
  if (document.getElementById('spot-1').classList.contains('done')) return;
  document.getElementById('spot-1').classList.add('done');
  celebrate(1);
}

// Day 2 — two spots: bread + cup
function day2a() {
  if (d2a) return;
  d2a = true;
  document.getElementById('spot-2a').classList.add('done');
  playAudio('r2Fail'); // gentle "keep going" sound
  if (d2a && d2b) setTimeout(()=>celebrate(2), 400);
}
function day2b() {
  if (d2b) return;
  d2b = true;
  document.getElementById('spot-2b').classList.add('done');
  playAudio('r2Fail');
  if (d2a && d2b) setTimeout(()=>celebrate(2), 400);
}

// Day 3 — two spots: cross THEN heart
function day3a() {
  if (d3a) return;
  d3a = true;
  document.getElementById('spot-3a').classList.add('done');
  playAudio('r3Fail');
  if (d3a && d3b) setTimeout(()=>celebrate(3), 400);
}
function day3b() {
  if (d3b) return;
  d3b = true;
  document.getElementById('spot-3b').classList.add('done');
  playAudio('r3Fail');
  if (d3a && d3b) setTimeout(()=>celebrate(3), 400);
}

// Day 4 — one spot: stone
function day4Click() {
  if (document.getElementById('spot-4').classList.contains('done')) return;
  document.getElementById('spot-4').classList.add('done');
  celebrate(4);
}

// Day 5 — one spot: angel
function day5Click() {
  if (document.getElementById('spot-5').classList.contains('done')) return;
  document.getElementById('spot-5').classList.add('done');
  celebrate(5);
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
showDay(1);
</script>
</body>
</html>
