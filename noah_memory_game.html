<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐾 動物配對 — 挪亞方舟</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; touch-action: manipulation; }

:root {
  --primary: #6C5CE7;
  --success: #00C851;
  --gold: #FFD700;
  --shadow: 0 4px 20px rgba(0,0,0,0.15);
  --radius: 20px;
}

body {
  font-family: 'Noto Sans TC', 'PingFang HK', 'Microsoft JhengHei', sans-serif;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
  height: 100vh; width: 100vw;
  position: relative; overflow: hidden;
  color: white;
}

/* NAVBAR */
#navbar { position: fixed; top: 12px; left: 10px; right: 10px; z-index: 999; display: flex; justify-content: space-between; align-items: center; }
.nav-title { font-size: 1.1rem; font-weight: 700; color: var(--gold); text-shadow: 0 2px 8px rgba(255,215,0,0.3); }
.nav-btn { background: rgba(255,255,255,0.9); border: none; border-radius: 12px; padding: 8px 14px; font-size: 1rem; cursor: pointer; box-shadow: var(--shadow); }
#lang-wrap { position: relative; }
#lang-menu { display: none; flex-direction: column; gap: 4px; position: absolute; top: 110%; right: 0; background: rgba(255,255,255,0.97); border-radius: 14px; padding: 8px; box-shadow: var(--shadow); min-width: 90px; }
#lang-menu.show { display: flex; }
.lang-btn { background: var(--primary); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-size: 0.95rem; cursor: pointer; text-align: left; }

/* STATS BAR */
#stats-bar { position: fixed; top: 64px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 999; }
.stat { background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border-radius: 12px; padding: 6px 16px; font-size: 1rem; display: flex; align-items: center; gap: 6px; }

/* GAME GRID */
#game-container { position: fixed; top: 110px; left: 10px; right: 10px; bottom: 20px; display: flex; align-items: center; justify-content: center; }
#grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 480px; aspect-ratio: 1; }

/* CARD */
.card { perspective: 1000px; cursor: pointer; }
.card-inner { width: 100%; height: 0; padding-bottom: 100%; position: relative; transition: transform 0.45s; transform-style: preserve-3d; }
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-front, .card-back { position: absolute; inset: 0; border-radius: var(--radius); backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.card-front { background: linear-gradient(135deg, #6C5CE7, #a29bfe); box-shadow: 0 4px 16px rgba(108,92,231,0.4); font-size: 2.5rem; }
.card-back { background: white; transform: rotateY(180deg); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
.card-back img { width: 85%; height: 85%; object-fit: contain; border-radius: 12px; }

/* COMPLETE SCREEN */
#screen-complete { background: linear-gradient(180deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%); justify-content: center; gap: 20px; }
.complete-rainbow { font-size: 3.5rem; animation: rainbowPulse 1.5s ease-in-out infinite; }
@keyframes rainbowPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.complete-title { font-size: 1.8rem; color: var(--gold); font-weight: 800; text-align: center; }
.complete-stars { font-size: 2rem; letter-spacing: 4px; }
.complete-stats { background: rgba(255,255,255,0.1); border-radius: var(--radius); padding: 16px 24px; font-size: 1.1rem; text-align: center; line-height: 1.6; }
.complete-btn { border: none; border-radius: 20px; padding: 14px 32px; font-size: 1.1rem; font-weight: 700; cursor: pointer; font-family: inherit; background: var(--success); color: white; box-shadow: var(--shadow); }
.complete-btn.secondary { background: var(--primary); margin-top: 8px; }

/* RAINBOW CONFETTI */
.confetti { position: fixed; inset: 0; pointer-events: none; z-index: 998; overflow: hidden; }
.confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall 3s ease-in forwards; }
@keyframes confettiFall { 0%{transform:translateY(-100px) rotate(0deg); opacity:1} 100%{transform:translateY(100vh) rotate(720deg); opacity:0} }

/* START SCREEN */
#screen-start { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%); justify-content: center; gap: 20px; }
.start-title { font-size: 1.6rem; color: var(--gold); font-weight: 800; text-align: center; }
.start-emoji { font-size: 4rem; }
.start-desc { background: rgba(255,255,255,0.1); border-radius: var(--radius); padding: 14px 20px; max-width: 90vw; text-align: center; font-size: 1rem; line-height: 1.5; backdrop-filter: blur(6px); }
.start-btn { border: none; border-radius: 24px; padding: 16px 48px; font-size: 1.3rem; font-weight: 700; cursor: pointer; font-family: inherit; background: var(--primary); color: white; box-shadow: var(--shadow); }
</style>
</head>
<body>

<div id="navbar">
  <button class="nav-btn" onclick="location.href='index.html'">🏠</button>
  <span class="nav-title">🐾 動物配對</span>
  <div id="lang-wrap">
    <button class="nav-btn" id="lang-toggle" onclick="toggleLang()">粵</button>
    <div id="lang-menu">
      <button class="lang-btn" onclick="setLang('zhHK')">粵</button>
      <button class="lang-btn" onclick="setLang('zhCN')">中</button>
      <button class="lang-btn" onclick="setLang('en')">ENG</button>
    </div>
  </div>
</div>

<div id="stats-bar">
  <div class="stat">⏱️ <span id="timer">0:00</span></div>
  <div class="stat">👆 <span id="moves">0</span></div>
</div>

<!-- START SCREEN -->
<div id="screen-start" class="screen active">
  <div class="start-emoji">🐾</div>
  <div class="start-title" id="start-title">動物配對遊戲</div>
  <div class="start-desc" id="start-desc">
    挪亞方舟上有8種動物，佢哋走散了！<br>幫我哋搵到相同嘅動物朋友配對佢哋啦！<br><br>👆 點擊卡牌睇下面係咩動物<br>✊ 兩張相同就配對成功
  </div>
  <button class="start-btn" id="start-btn" onclick="startGame()">開始遊戲 🎮</button>
</div>

<!-- GAME SCREEN -->
<div id="game-container">
  <div id="grid"></div>
</div>

<!-- COMPLETE SCREEN -->
<div id="screen-complete" class="screen">
  <div class="complete-rainbow">🌈✨🎉</div>
  <div class="complete-title" id="complete-title">全部配對成功！</div>
  <div class="complete-stars" id="complete-stars">⭐⭐⭐⭐⭐</div>
  <div class="complete-stats" id="complete-stats"></div>
  <button class="complete-btn" onclick="restartGame()">再玩一次 🔄</button>
  <button class="complete-btn secondary" onclick="location.href='index.html'">返回主頁 🏠</button>
</div>

<div class="confetti" id="confetti"></div>

<script>
// ============ TRANSLATIONS ============
const T = {
  zhHK: {
    startTitle: '動物配對遊戲',
    startDesc: '挪亞方舟上有8種動物，佢哋走散了！<br>幫我哋搵到相同嘅動物朋友配對佢哋啦！<br><br>👆 點擊卡牌睇下面係咩動物<br>✊ 兩張相同就配對成功',
    startBtn: '開始遊戲 🎮',
    completeTitle: '全部配對成功！',
    completeText: '用時 {time} ｜ 總共 {moves} 步',
    langBtn: '粵'
  },
  zhCN: {
    startTitle: '动物配对游戏',
    startDesc: '挪亚方舟上有8种动物，它们走散了！<br>帮我们找到相同的动物朋友配对吧！<br><br>👆 点击卡牌看下面是什么动物<br>✊ 两张相同就配对成功',
    startBtn: '开始游戏 🎮',
    completeTitle: '全部配对成功！',
    completeText: '用时 {time} ｜ 总共 {moves} 步',
    langBtn: '中'
  },
  en: {
    startTitle: 'Animal Matching Game',
    startDesc: '8 animals from Noah\'s Ark got separated!<br>Help match the same animal pairs!<br><br>👆 Tap a card to flip it<br>✊ Match two identical animals',
    startBtn: 'Start Game 🎮',
    completeTitle: 'All Matched!',
    completeText: 'Time: {time} ｜ {moves} moves',
    langBtn: 'ENG'
  }
};

// ============ AUDIO ============
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, type='sine', vol=0.3) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playFlip() { playTone(440, 0.1, 'sine', 0.15); }
function playMatch() {
  playTone(523, 0.12, 'sine', 0.25);
  setTimeout(() => playTone(659, 0.12, 'sine', 0.25), 100);
  setTimeout(() => playTone(784, 0.2, 'sine', 0.25), 200);
}
function playNoMatch() {
  playTone(200, 0.2, 'square', 0.15);
  setTimeout(() => playTone(180, 0.2, 'square', 0.12), 150);
}
function playWin() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'sine', 0.2), i * 150));
}

// ============ GAME STATE ============
let lang = 'zhHK';
let moves = 0;
let matched = 0;
let flipped = [];
let locked = false;
let timer = null;
let seconds = 0;
let gameStarted = false;

const ANIMALS = [
  { id: 'elephant', emoji: '🐘', name: { zhHK: '大象', zhCN: '大象', en: 'Elephant' } },
  { id: 'lion', emoji: '🦁', name: { zhHK: '獅子', zhCN: '狮子', en: 'Lion' } },
  { id: 'wolf', emoji: '🐺', name: { zhHK: '狼', zhCN: '狼', en: 'Wolf' } },
  { id: 'sheep', emoji: '🐑', name: { zhHK: '綿羊', zhCN: '绵羊', en: 'Sheep' } },
  { id: 'cow', emoji: '🐄', name: { zhHK: '乳牛', zhCN: '奶牛', en: 'Cow' } },
  { id: 'horse', emoji: '🐴', name: { zhHK: '馬', zhCN: '马', en: 'Horse' } },
  { id: 'rabbit', emoji: '🐰', name: { zhHK: '兔仔', zhCN: '兔子', en: 'Rabbit' } },
  { id: 'deer', emoji: '🦌', name: { zhHK: '鹿', zhCN: '鹿', en: 'Deer' } }
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  const pairs = [...ANIMALS, ...ANIMALS];
  return shuffle(pairs);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setLang(l) {
  lang = l;
  document.getElementById('lang-toggle').textContent = T[l].langBtn;
  document.getElementById('lang-menu').classList.remove('show');
  document.getElementById('start-title').textContent = T[l].startTitle;
  document.getElementById('start-desc').innerHTML = T[l].startDesc;
  document.getElementById('start-btn').textContent = T[l].startBtn;
  document.getElementById('timer').textContent = formatTime(seconds);
}

function toggleLang() {
  document.getElementById('lang-menu').classList.toggle('show');
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function startTimer() {
  timer = setInterval(() => {
    seconds++;
    document.getElementById('timer').textContent = formatTime(seconds);
  }, 1000);
}

function stopTimer() { clearInterval(timer); }

function startGame() {
  moves = 0; matched = 0; flipped = []; locked = false; seconds = 0; gameStarted = true;
  document.getElementById('moves').textContent = '0';
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('grid').innerHTML = '';
  showScreen('');
  document.getElementById('game-container').style.display = 'flex';
  document.getElementById('stats-bar').style.display = 'flex';
  buildGrid();
  startTimer();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  const deck = buildDeck();
  deck.forEach((animal, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = idx;
    card.dataset.animal = animal.id;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">🐾</div>
        <div class="card-back">
          <img src="img/noah/animals/${animal.id}.jpg" alt="${animal.name[lang]}"
               onerror="this.parentElement.textContent='${animal.emoji}'; this.style.display='none'">
        </div>
      </div>`;
    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
  });
}

function flipCard(card) {
  if (locked) return;
  if (card.classList.contains('flipped')) return;
  if (flipped.length >= 2) return;
  if (gameStarted === false) return;

  playFlip();
  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    const [a, b] = flipped;
    if (a.dataset.animal === b.dataset.animal) {
      playMatch();
      matched++;
      flipped = [];
      if (matched === 8) {
        stopTimer();
        playWin();
        setTimeout(showComplete, 600);
      }
    } else {
      locked = true;
      setTimeout(() => {
        playNoMatch();
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped = [];
        locked = false;
      }, 700);
    }
  }
}

function showComplete() {
  showScreen('screen-complete');
  document.getElementById('complete-title').textContent = T[lang].completeTitle;
  document.getElementById('complete-stats').innerHTML = T[lang].completeText
    .replace('{time}', formatTime(seconds))
    .replace('{moves}', moves);
  // Stars based on performance
  const stars = moves <= 12 ? 5 : moves <= 18 ? 4 : moves <= 26 ? 3 : 2;
  document.getElementById('complete-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);
  spawnConfetti();
}

function restartGame() {
  showScreen('screen-start');
  document.getElementById('game-container').style.display = 'none';
  document.getElementById('stats-bar').style.display = 'none';
  stopTimer();
  gameStarted = false;
}

function spawnConfetti() {
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  const colors = ['#FF6B6B','#FFD700','#00C851','#6C5CE7','#FF9FF3','#54a0ff'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 2 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.appendChild(piece);
  }
  setTimeout(() => c.innerHTML = '', 5000);
}

setLang('zhHK');
</script>
</body>
</html>
