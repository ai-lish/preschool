<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>第六日 — 造人大冒險 🌟</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; touch-action: manipulation; }

:root {
  --primary: #6C5CE7;
  --gold: #FFD700;
  --shadow: 0 4px 20px rgba(0,0,0,0.15);
  --radius: 24px;
}

body {
  font-family: 'Noto Sans TC', 'PingFang HK', 'Microsoft JhengHei', sans-serif;
  background: linear-gradient(180deg, #87CEEB 0%, #98FB98 40%, #228B22 100%);
  height: 100vh; width: 100vw;
  position: relative; overflow: hidden;
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

/* NAVBAR */
#navbar { position: fixed; top: 12px; left: 10px; right: 10px; z-index: 999; display: flex; justify-content: space-between; align-items: center; }
.nav-title { font-size: 1.1rem; font-weight: 700; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.nav-btn { background: rgba(255,255,255,0.9); border: none; border-radius: 12px; padding: 8px 14px; font-size: 1rem; cursor: pointer; box-shadow: var(--shadow); }
#lang-wrap { position: relative; }
#lang-menu { display: none; flex-direction: column; gap: 4px; position: absolute; top: 110%; right: 0; background: rgba(255,255,255,0.97); border-radius: 14px; padding: 8px; box-shadow: var(--shadow); min-width: 90px; }
#lang-menu.show { display: flex; }
.lang-btn { background: var(--primary); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-size: 0.95rem; cursor: pointer; }

/* SCREENS */
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; padding: 70px 20px 20px; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }

/* START SCREEN */
#screen-start { background: linear-gradient(180deg, #87CEEB 0%, #90EE90 60%, #228B22 100%); gap: 16px; padding-top: 80px; }
.start-day { font-size: 5rem; animation: floatDay 3s ease-in-out infinite; }
@keyframes floatDay { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-15px) scale(1.05)} }
.start-title { font-size: 1.8rem; font-weight: 800; text-align: center; color: #FFD700; text-shadow: 0 3px 10px rgba(255,215,0,0.5); }
.start-narration { background: rgba(255,255,255,0.25); backdrop-filter: blur(8px); border-radius: var(--radius); padding: 16px 20px; max-width: 90vw; font-size: 1.05rem; text-align: center; line-height: 1.5; }
.start-btn { border: none; border-radius: 24px; padding: 16px 40px; font-size: 1.2rem; font-weight: 700; cursor: pointer; font-family: inherit; background: #FFD700; color: #6C5CE7; box-shadow: var(--shadow); }
.start-btn:active { transform: scale(0.95); }

/* GARDEN SCENE */
#screen-garden { background: url('img/creation/草地背景.png') center/cover no-repeat; justify-content: flex-end; padding-bottom: 30px; gap: 16px; }
.garden-title { position: fixed; top: 68px; left: 50%; transform: translateX(-50%); background: rgba(255,215,0,0.9); color: #6C5CE7; padding: 8px 20px; border-radius: 20px; font-size: 1.1rem; font-weight: 700; z-index: 998; text-shadow: none; }

/* CHARACTERS */
.characters { position: fixed; bottom: 140px; left: 0; right: 0; display: flex; justify-content: center; gap: 30px; z-index: 10; }
.char { cursor: pointer; transition: transform 0.3s; user-select: none; }
.char:active { transform: scale(1.1); }
.char-label { text-align: center; font-size: 0.9rem; margin-top: 4px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 2px 8px; }
#adam { width: 100px; }
#eve { width: 90px; }

@keyframes jumpAnim { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-40px)} }
@keyframes clapAnim { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-15deg)} 75%{transform:rotate(15deg)} }
@keyframes danceAnim { 0%{transform:rotate(0) scale(1)} 25%{transform:rotate(-10deg) scale(1.05)} 75%{transform:rotate(10deg) scale(1.05)} 100%{transform:rotate(0) scale(1)} }

.jumping { animation: jumpAnim 0.6s ease-in-out; }
.clapping { animation: clapAnim 0.4s ease-in-out; }
.dancing { animation: danceAnim 0.8s ease-in-out infinite; }

/* ACTION BUTTONS */
.actions { position: fixed; bottom: 30px; left: 10px; right: 10px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; z-index: 20; }
.action-btn { background: rgba(255,255,255,0.95); border: none; border-radius: 16px; padding: 12px 20px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; color: #6C5CE7; box-shadow: var(--shadow); display: flex; align-items: center; gap: 6px; }
.action-btn:active { transform: scale(0.93); }

/* FRUIT GAME */
#screen-fruit { background: linear-gradient(180deg, #87CEEB 0%, #98FB98 50%, #228B22 100%); gap: 16px; }
.fruit-title { font-size: 1.3rem; font-weight: 700; color: #FFD700; text-align: center; }
.fruit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 90vw; max-width: 360px; }
.fruit-item { background: rgba(255,255,255,0.85); border-radius: var(--radius); padding: 16px; text-align: center; cursor: pointer; transition: transform 0.2s; box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; gap: 6px; }
.fruit-item:active { transform: scale(0.95); }
.fruit-item.matched { background: #c8f7c5; }
.fruit-item.wrong { background: #ffcccc; animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.fruit-emoji { font-size: 2.5rem; }
.fruit-label { font-size: 0.9rem; color: #333; font-weight: 600; }
.fruit-score { font-size: 1.1rem; font-weight: 700; color: #FFD700; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.fruit-nav { display: flex; gap: 12px; }
.fruit-nav-btn { border: none; border-radius: 20px; padding: 12px 24px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
.fruit-nav-btn.back { background: rgba(255,255,255,0.8); color: #6C5CE7; }
.fruit-nav-btn.next { background: #FFD700; color: #6C5CE7; }

/* COMPLETE SCREEN */
#screen-complete { background: linear-gradient(180deg, #FFD700 0%, #FF8C00 50%, #FF6347 100%); gap: 20px; justify-content: center; }
.complete-emoji { font-size: 4rem; animation: bounce 1s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
.complete-title { font-size: 2rem; font-weight: 800; text-align: center; }
.complete-desc { background: rgba(255,255,255,0.3); border-radius: var(--radius); padding: 14px 20px; max-width: 90vw; text-align: center; font-size: 1.05rem; }
.complete-btn { border: none; border-radius: 24px; padding: 14px 32px; font-size: 1.1rem; font-weight: 700; cursor: pointer; font-family: inherit; background: white; color: #FF6347; box-shadow: var(--shadow); }

/* AUDIO BTN */
#audio-btn { position: fixed; bottom: 80px; right: 16px; z-index: 999; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 1.4rem; cursor: pointer; box-shadow: var(--shadow); }
</style>
</head>
<body>

<div id="navbar">
  <button class="nav-btn" onclick="location.href='creation_game.html'">◀️</button>
  <span class="nav-title" id="nav-title">🌟 第六日 — 造人</span>
  <div id="lang-wrap">
    <button class="nav-btn" id="lang-toggle" onclick="toggleLang()">粵</button>
    <div id="lang-menu">
      <button class="lang-btn" onclick="setLang('zhHK')">粵</button>
      <button class="lang-btn" onclick="setLang('zhCN')">中</button>
      <button class="lang-btn" onclick="setLang('en')">ENG</button>
    </div>
  </div>
</div>

<!-- START SCREEN -->
<div id="screen-start" class="screen active">
  <div class="start-day">🌟</div>
  <div class="start-title" id="start-title">第六日 — 造人大冒險</div>
  <div class="start-narration" id="start-narration">
    神創造了天地萬物，到咗第六日，祂決定做一件最特別嘅事——創造人類！<br><br>
    神用泥土造咗亞當，喺佢鼻孔度吹咗一口生氣，亞當就活喇！<br><br>
    然後神用亞當嘅肋骨造咗夏娃，佢哋一齊住喺美麗嘅伊甸園裏面！
  </div>
  <button class="start-btn" id="start-btn" onclick="showGarden()">去伊甸園 🌳</button>
</div>

<!-- GARDEN SCREEN -->
<div id="screen-garden" class="screen">
  <div class="garden-title" id="garden-title">點擊人物！</div>
  <div class="characters">
    <div style="display:flex;flex-direction:column;align-items:center">
      <img id="adam" src="img/creation/亞當人形.png" alt="Adam" class="char" onclick="doAction('adam')">
      <div class="char-label" id="adam-label">亞當 Adam</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center">
      <img id="eve" src="img/creation/夏娃.png" alt="Eve" class="char" onclick="doAction('eve')">
      <div class="char-label" id="eve-label">夏娃 Eve</div>
    </div>
  </div>
  <div class="actions">
    <button class="action-btn" onclick="doAction('jump')">🦘 跳跳</button>
    <button class="action-btn" onclick="doAction('clap')">👏 拍手</button>
    <button class="action-btn" onclick="doAction('dance')">💃 跳舞</button>
    <button class="action-btn" onclick="doAction('wave')">👋 揮手</button>
    <button class="action-btn" onclick="showFruitGame()">🍎 水果遊戲 ▶</button>
  </div>
</div>

<!-- FRUIT GAME SCREEN -->
<div id="screen-fruit" class="screen">
  <div class="fruit-title" id="fruit-title">🍎 水果配對 🌟</div>
  <div class="fruit-score" id="fruit-score">❤️❤️❤️</div>
  <div class="fruit-grid" id="fruit-grid"></div>
  <div class="fruit-nav">
    <button class="fruit-nav-btn back" onclick="showGarden()">◀️ 伊甸園</button>
    <button class="fruit-nav-btn next" onclick="showComplete()">完成！✅</button>
  </div>
</div>

<!-- COMPLETE SCREEN -->
<div id="screen-complete" class="screen">
  <div class="complete-emoji">👨‍👩‍👧‍👦✨</div>
  <div class="complete-title" id="complete-title">恭喜完成！</div>
  <div class="complete-desc" id="complete-desc">
    神創造咗亞當和夏娃，佢哋係世界上第一個人類家庭！<br><br>
    🌟 你學會咗：<br>
    • 第六日係造人嘅日子<br>
    • 亞當係第一個男人<br>
    • 夏娃係第一個女人<br>
    • 我哋都係神嘅孩子！
  </div>
  <button class="complete-btn" onclick="location.href='creation_game.html'">返回創造遊戲 🏠</button>
</div>

<button id="audio-btn" onclick="playNarration()">🔊</button>

<script>
// ============ AUDIO ============
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, type='sine', vol=0.25) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playNarration() {
  const t = T[lang].narration;
  if (!t) return;
  playTone(440, 0.15); setTimeout(() => playTone(523, 0.15), 200);
}

// ============ TRANSLATIONS ============
const T = {
  zhHK: {
    navTitle: '🌟 第六日 — 造人',
    startTitle: '第六日 — 造人大冒險',
    startText: '神創造了天地萬物，到咗第六日，祂決定做一件最特別嘅事——創造人類！\n\n神用泥土造咗亞當，喺佢鼻孔度吹咗一口生氣，亞當就活喇！\n\n然後神用亞當嘅肋骨造咗夏娃，佢哋一齊住喺美麗嘅伊甸園裏面！',
    startBtn: '去伊甸園 🌳',
    gardenTitle: '點擊人物！',
    fruitTitle: '🍎 水果配對 🌟',
    adamLabel: '亞當 Adam',
    eveLabel: '夏娃 Eve',
    completeTitle: '恭喜完成！',
    completeText: '神創造咗亞當和夏娃，佢哋係世界上第一個人類家庭！\n\n🌟 你學會咗：\n• 第六日係造人嘅日子\n• 亞當係第一個男人\n• 夏娃係第一個女人\n• 我哋都係神嘅孩子！',
    langBtn: '粵'
  },
  zhCN: {
    navTitle: '🌟 第六日 — 造人',
    startTitle: '第六日 — 造人大冒险',
    startText: '神创造了天地万物，到了第六日，祂决定做一件最特别的事——创造人类！\n\n神用泥土造了亚当，在他鼻孔里吹了一口气，亚当就活了！\n\n然后神用亚当的肋骨造了夏娃，他们一起住在美丽的伊甸园里面！',
    startBtn: '去伊甸园 🌳',
    gardenTitle: '点击人物！',
    fruitTitle: '🍎 水果配对 🌟',
    adamLabel: '亚当 Adam',
    eveLabel: '夏娃 Eve',
    completeTitle: '恭喜完成！',
    completeText: '神创造了亚当和夏娃，他们是世界上第一个人类家庭！\n\n🌟 你学会了：\n• 第六日是造人的日子\n• 亚当是第一个男人\n• 夏娃是第一个女人\n• 我们都是神的孩子！',
    langBtn: '中'
  },
  en: {
    navTitle: '🌟 Day 6 — Creation of People',
    startTitle: 'Day 6 — Creation of People',
    startText: 'God created the heavens and the earth. On the sixth day, He decided to do something very special — create humans!\n\nGod formed Adam from the dust of the ground and breathed into his nostrils the breath of life.\n\nThen God used Adam\'s rib to create Eve. Together they lived in the beautiful Garden of Eden!',
    startBtn: 'Go to Eden 🌳',
    gardenTitle: 'Tap the characters!',
    fruitTitle: '🍎 Fruit Matching 🌟',
    adamLabel: 'Adam',
    eveLabel: 'Eve',
    completeTitle: 'Well Done!',
    completeText: 'God created Adam and Eve — the first human family in the world!\n\n🌟 You learned:\n• Day 6 is the day of creation of people\n• Adam was the first man\n• Eve was the first woman\n• We are all children of God!',
    langBtn: 'ENG'
  }
};

// ============ GAME STATE ============
let lang = 'zhHK';
let lives = 3;
let fruitsMatched = 0;
let currentFruits = [];
let flippedFruits = [];
let lockedFruits = false;

const FRUITS = [
  { id: 'apple', emoji: '🍎', name: { zhHK: '蘋果', zhCN: '苹果', en: 'Apple' } },
  { id: 'banana', emoji: '🍌', name: { zhHK: '香蕉', zhCN: '香蕉', en: 'Banana' } },
  { id: 'grape', emoji: '🍇', name: { zhHK: '葡萄', zhCN: '葡萄', en: 'Grape' } },
  { id: 'orange', emoji: '🍊', name: { zhHK: '橙', zhCN: '橙', en: 'Orange' } },
  { id: 'strawberry', emoji: '🍓', name: { zhHK: '士多啤梨', zhCN: '草莓', en: 'Strawberry' } },
  { id: 'watermelon', emoji: '🍉', name: { zhHK: '西瓜', zhCN: '西瓜', en: 'Watermelon' } }
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
}

function setLang(l) {
  lang = l;
  document.getElementById('lang-toggle').textContent = T[l].langBtn;
  document.getElementById('lang-menu').classList.remove('show');
  document.getElementById('nav-title').textContent = T[l].navTitle;
  document.getElementById('start-title').textContent = T[l].startTitle;
  document.getElementById('start-btn').textContent = T[l].startBtn;
  document.getElementById('garden-title').textContent = T[l].gardenTitle;
  document.getElementById('fruit-title').textContent = T[l].fruitTitle;
  document.getElementById('adam-label').textContent = T[l].adamLabel;
  document.getElementById('eve-label').textContent = T[l].eveLabel;
  document.getElementById('complete-title').textContent = T[l].completeTitle;
  document.getElementById('complete-desc').innerHTML = T[l].completeText.replace(/\n/g, '<br>');
  updateLives();
}

function toggleLang() {
  document.getElementById('lang-menu').classList.toggle('show');
}

function doAction(who) {
  const adam = document.getElementById('adam');
  const eve = document.getElementById('eve');
  [adam, eve].forEach(el => {
    el.classList.remove('jumping','clapping','dancing');
    void el.offsetWidth;
  });
  playTone(523, 0.1);
  if (who === 'jump') {
    (Math.random() > 0.5 ? adam : eve).classList.add('jumping');
  } else if (who === 'clap') {
    adam.classList.add('clapping');
    setTimeout(() => eve.classList.add('clapping'), 200);
  } else if (who === 'dance') {
    adam.classList.add('dancing');
    eve.classList.add('dancing');
  } else if (who === 'wave') {
    playTone(659, 0.15); playTone(784, 0.15);
  }
}

function showGarden() {
  showScreen('screen-garden');
}

function showFruitGame() {
  fruitsMatched = 0; flippedFruits = []; lockedFruits = false;
  lives = 3; updateLives();
  const grid = document.getElementById('fruit-grid');
  grid.innerHTML = '';
  currentFruits = shuffle([...FRUITS, ...FRUITS].slice(0, 6));
  currentFruits.forEach((fruit, idx) => {
    const item = document.createElement('div');
    item.className = 'fruit-item';
    item.dataset.idx = idx;
    item.dataset.fruit = fruit.id;
    item.innerHTML = `<div class="fruit-emoji">❓</div><div class="fruit-label">${fruit.name[lang]}</div>`;
    item.addEventListener('click', () => flipFruit(item, fruit));
    grid.appendChild(item);
  });
  showScreen('screen-fruit');
}

function flipFruit(el, fruit) {
  if (lockedFruits) return;
  if (el.classList.contains('matched')) return;
  if (el.classList.contains('flipped')) return;

  playTone(440 + Math.random() * 200, 0.12, 'sine', 0.2);
  el.classList.add('flipped');
  el.querySelector('.fruit-emoji').textContent = fruit.emoji;
  flippedFruits.push({ el, fruit });

  if (flippedFruits.length === 2) {
    lockedFruits = true;
    const [a, b] = flippedFruits;
    if (a.fruit.id === b.fruit.id) {
      playTone(523, 0.15); playTone(659, 0.15); playTone(784, 0.2);
      a.el.classList.add('matched');
      b.el.classList.add('matched');
      flippedFruits = []; lockedFruits = false;
      fruitsMatched++;
      if (fruitsMatched === 3) {
        setTimeout(() => {
          playTone(523,0.15); playTone(659,0.15); playTone(784,0.15); playTone(1047,0.3);
        }, 300);
      }
    } else {
      lives--;
      updateLives();
      a.el.classList.add('wrong');
      b.el.classList.add('wrong');
      playTone(200, 0.2, 'square', 0.15);
      setTimeout(() => {
        a.el.classList.remove('wrong','flipped');
        b.el.classList.remove('wrong','flipped');
        a.el.querySelector('.fruit-emoji').textContent = '❓';
        b.el.querySelector('.fruit-emoji').textContent = '❓';
        flippedFruits = []; lockedFruits = false;
        if (lives <= 0) {
          setTimeout(showFruitGame, 800);
        }
      }, 700);
    }
  }
}

function updateLives() {
  document.getElementById('fruit-score').textContent = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
}

function showComplete() {
  showScreen('screen-complete');
  playTone(523,0.15); playTone(659,0.15); playTone(784,0.15); playTone(1047,0.4);
}

setLang('zhHK');
</script>
</body>
</html>
