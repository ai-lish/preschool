<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌟 晞霖學習網站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: "Comic Sans MS", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #FFE4B5 0%, #87CEEB 100%);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        
        /* ===== 主頁面 ===== */
        .menu { padding: 20px; min-height: 100vh; text-align: center; }
        
        .title { font-size: 32px; color: #FF6F61; text-shadow: 2px 2px white; margin-bottom: 25px; }
        
        /* 科目選擇 */
        .subject-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .subject-btn {
            flex: 1;
            min-width: 100px;
            max-width: 150px;
            padding: 20px 15px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        
        .subject-btn:active { transform: scale(0.95); }
        .subject-btn.chinese { background: #FFB6C1; color: #8B4513; }
        .subject-btn.math { background: #87CEEB; color: #4169E1; }
        .subject-btn.english { background: #98FB98; color: #228B22; }
        
        /* 週數選擇 */
        .weeks-container {
            display: none;
            padding: 20px;
            min-height: 100vh;
        }
        
        .weeks-container.active { display: block; }
        
        .back-btn {
            position: fixed;
            top: 15px; left: 15px;
            padding: 10px 20px;
            background: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }
        
        .subject-title {
            font-size: 28px;
            color: #5D4037;
            text-align: center;
            margin: 10px 0 20px;
        }
        
        /* 週數格仔 */
        .weeks-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 350px;
            margin: 0 auto;
        }
        
        .week-btn {
            background: white;
            border-radius: 15px;
            padding: 20px 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            border: 3px solid transparent;
        }
        
        .week-btn:active { transform: scale(0.95); }
        .week-btn:hover { border-color: #FF6F61; }
        .week-btn.locked { opacity: 0.5; cursor: not-allowed; }
        
        /* ===== 遊戲頁面 ===== */
        .game-page { display: none; min-height: 100vh; }
        .game-page.active { display: block; }
        
        .game-header {
            background: rgba(255,255,255,0.9);
            padding: 15px;
            text-align: center;
        }
        
        .game-week-badge {
            display: inline-block;
            background: #D32F2F;
            color: white;
            padding: 5px 20px;
            border-radius: 15px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .game-subject-title {
            font-size: 22px;
            color: #5D4037;
            margin-bottom: 5px;
        }
        
        /* Tab 導航 */
        .tab-nav {
            display: flex;
            background: white;
            border-bottom: 2px solid #eee;
            overflow-x: auto;
        }
        
        .tab-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 10px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .tab-btn.active {
            color: #FF6F61;
            border-bottom: 3px solid #FF6F61;
        }
        
        .tab-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
        }
        
        /* Tab 內容 */
        .tab-content {
            display: none;
            padding: 20px;
        }
        
        .tab-content.active { display: block; }
        
        /* ===== 遊戲 1: 男女配對 ===== */
        .game-instruction {
            text-align: center;
            font-size: 16px;
            color: #5D4037;
            margin: 15px auto;
            padding: 10px 15px;
            background: rgba(255,255,255,0.7);
            border-radius: 10px;
            max-width: 350px;
        }
        
        .sentence-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .sentence-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .sentence-icon { font-size: 50px; }
        .sentence-text { font-size: 22px; color: #5D4037; }
        
        .drop-target {
            width: 70px;
            height: 60px;
            border: 3px dashed #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            background: #f9f9f9;
            transition: all 0.3s;
        }
        
        .drop-target.drag-over { border-color: #4CAF50; background: #E8F5E9; transform: scale(1.05); }
        .drop-target.filled { border-style: solid; border-color: #4CAF50; background: #C8E6C9; }
        .drop-target.wrong { border-color: #f44336; background: #FFCDD2; animation: shake 0.5s; }
        
        .drag-source {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 25px 0;
            padding: 15px;
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
        }
        
        .drag-item {
            font-size: 50px;
            padding: 10px 20px;
            background: white;
            border-radius: 15px;
            cursor: grab;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s, opacity 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .drag-item:active { cursor: grabbing; transform: scale(1.1); }
        .drag-item.used { opacity: 0.3; pointer-events: none; }
        
        /* ===== 遊戲 2: 顏色配對 ===== */
        .color-game-container { max-width: 400px; margin: 0 auto; }
        
        .color-target-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .color-target {
            width: 80px;
            height: 80px;
            border: 4px dashed #ccc;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            background: #f9f9f9;
            transition: all 0.3s;
        }
        
        .color-target.matched { border-style: solid; transform: scale(1.05); }
        .color-target.matched-red { border-color: #f44336; background: #FFEBEE; }
        .color-target.matched-yellow { border-color: #FFEB3B; background: #FFFDE7; }
        .color-target.matched-blue { border-color: #2196F3; background: #E3F2FD; }
        .color-target.matched-green { border-color: #4CAF50; background: #E8F5E9; }
        
        .color-drag-source {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .color-butterfly {
            font-size: 45px;
            padding: 8px;
            background: white;
            border-radius: 12px;
            cursor: grab;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .color-butterfly:active { transform: scale(1.15); }
        .color-butterfly.used { opacity: 0.3; pointer-events: none; }
        
        /* 蝴蝶顏色 */
        .butterfly-red { background: #FFEBEE; border: 3px solid #f44336; }
        .butterfly-yellow { background: #FFFDE7; border: 3px solid #FFEB3B; }
        .butterfly-blue { background: #E3F2FD; border: 3px solid #2196F3; }
        .butterfly-green { background: #E8F5E9; border: 3px solid #4CAF50; }
        
        /* 連線區 */
        .trace-section { display: none; margin-top: 20px; text-align: center; }
        .trace-section.active { display: block; }
        
        .trace-title { font-size: 18px; color: #5D4037; margin-bottom: 15px; }
        
        .trace-box {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin: 10px auto;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .trace-line {
            height: 10px;
            background: repeating-linear-gradient(
                to right,
                #ccc 0px, #ccc 8px,
                transparent 8px, transparent 12px,
                #ccc 12px, #ccc 16px,
                transparent 16px, transparent 20px
            );
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }
        
        .trace-line::before {
            content: "→";
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 18px;
        }
        
        .trace-line.done { background: #4CAF50; }
        .trace-line.done::after { content: " ✅"; }
        
        /* ===== 遊戲 3: 女字書寫 ===== */
        .stroke-demo { text-align: center; margin: 15px auto; max-width: 350px; }
        
        .big-character {
            font-size: 120px;
            color: #333;
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        
        .stroke-hint { font-size: 16px; color: #888; }
        
        .stroke-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px auto;
            max-width: 350px;
        }
        
        .stroke-step {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            max-width: 300px;
        }
        
        .stroke-step:active { transform: scale(0.98); }
        .stroke-step.current { border: 3px solid #2196F3; background: #E3F2FD; }
        .stroke-step.done { background: #C8E6C9; border: 3px solid #4CAF50; }
        
        .stroke-num {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        
        .stroke-step.done .stroke-num { background: #4CAF50; }
        .stroke-step.current .stroke-num { background: #2196F3; }
        
        .stroke-info { flex: 1; text-align: left; }
        .stroke-name { font-size: 18px; color: #5D4037; }
        .stroke-direction { font-size: 13px; color: #888; }
        .stroke-visual { font-size: 40px; width: 50px; text-align: center; }
        
        /* 按鈕列 */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .action-btn {
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .action-btn:active { transform: scale(0.95); }
        .btn-reset { background: #FF9800; color: white; }
        .btn-save { background: #4CAF50; color: white; }
        .btn-next { background: #2196F3; color: white; }
        
        /* ===== 表揚畫面 ===== */
        .celebration {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .celebration.show { display: flex; }
        
        .celebration-text { font-size: 50px; color: #FFD700; animation: bounce 1s infinite; }
        .celebration-sub { font-size: 22px; color: white; margin-top: 15px; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .celebration-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 22px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
        
        /* ===== 儲存提示 ===== */
        .save-toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            z-index: 1001;
            animation: fadeInOut 2s forwards;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        /* ===== Responsive ===== */
        @media (orientation: landscape) and (max-height: 600px) {
            .title { font-size: 24px !important; }
            .subject-btn { padding: 12px 10px; font-size: 16px; }
        }
        
        @media (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .title { font-size: 28px; }
            .subject-btn { max-width: 180px; padding: 25px 20px; font-size: 20px; }
            .weeks-grid { max-width: 500px; grid-template-columns: repeat(4, 1fr); }
            .week-btn { padding: 25px 15px; font-size: 20px; }
        }
        
        @media (max-width: 480px) {
            .title { font-size: 24px; }
            .subject-container { gap: 10px; }
            .subject-btn { min-width: 80px; padding: 15px 10px; font-size: 14px; }
            .weeks-grid { gap: 10px; }
            .week-btn { padding: 15px 8px; font-size: 14px; }
            .tab-btn { padding: 10px 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- ===== 主頁面 ===== -->
    <div class="menu" id="main-menu">
        <h1 class="title">🌟 晞霖學習網站 🌟</h1>
        
        <div class="subject-container">
            <button class="subject-btn chinese" onclick="showSubject('chinese')">
                📖 語文
            </button>
            <button class="subject-btn math" onclick="showSubject('math')">
                🔢 數學
            </button>
            <button class="subject-btn english" onclick="showSubject('english')">
                🔤 英文
            </button>
        </div>
    </div>
    
    <!-- ===== 語文科 ===== -->
    <div id="chinese-weeks" class="weeks-container">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="subject-title">📖 語文</h2>
        <div class="weeks-grid">
            <button class="week-btn" onclick="showWeek('chinese', 1)">第1週</button>
            <button class="week-btn" onclick="showWeek('chinese', 2)">第2週</button>
            <button class="week-btn" onclick="showWeek('chinese', 3)">第3週</button>
            <button class="week-btn locked">第4週</button>
            <button class="week-btn locked">第5週</button>
            <button class="week-btn locked">...</button>
        </div>
    </div>
    
    <!-- ===== 數學科 ===== -->
    <div id="math-weeks" class="weeks-container">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="subject-title">🔢 數學</h2>
        <div class="weeks-grid">
            <button class="week-btn locked">第1週</button>
            <button class="week-btn locked">第2週</button>
            <button class="week-btn locked">...</button>
        </div>
    </div>
    
    <!-- ===== 英文科 ===== -->
    <div id="english-weeks" class="weeks-container">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="subject-title">🔤 英文</h2>
        <div class="weeks-grid">
            <button class="week-btn locked">第1週</button>
            <button class="week-btn locked">...</button>
        </div>
    </div>
    
    <!-- ===== 語文 第1週 遊戲頁面 ===== -->
    <div id="chinese-week1" class="game-page">
        <div class="game-header">
            <button class="back-btn" onclick="goBackToWeeks('chinese')">🔙 返回</button>
            <div class="game-week-badge">第 1 週</div>
            <h2 class="game-subject-title">📖 語文 — 男孩子和女孩子</h2>
            
            <!-- Tab 導航 -->
            <div class="tab-nav">
                <button class="tab-btn active" id="tab-1" onclick="showTab(1)">👦👧 男女配對</button>
                <button class="tab-btn" id="tab-2" onclick="showTab(2)">🎀 顏色配對</button>
                <button class="tab-btn" id="tab-3" onclick="showTab(3)">✏️ 女字書寫</button>
            </div>
        </div>
        
        <!-- Tab 1: 男女配對 -->
        <div id="game1-content" class="tab-content active">
            <div class="game-instruction">將「男」或「女」字拖入正確位置</div>
            
            <div class="sentence-area">
                <div class="sentence-row">
                    <div class="sentence-icon">👦</div>
                    <div class="sentence-text">我是</div>
                    <div class="drop-target" id="drop-jun" 
                         ondragover="handleDragOver(event)" 
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event, 'jun')"></div>
                    <div class="sentence-text">孩子</div>
                </div>
                <div class="sentence-row">
                    <div class="sentence-icon">👧</div>
                    <div class="sentence-text">我是</div>
                    <div class="drop-target" id="drop-qi" 
                         ondragover="handleDragOver(event)" 
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event, 'qi')"></div>
                    <div class="sentence-text">孩子</div>
                </div>
            </div>
            
            <div class="drag-source" id="drag-source">
                <div class="drag-item" id="drag-male" draggable="true"
                     ondragstart="handleDragStart(event, '男')"
                     ondragend="handleDragEnd(event)">男</div>
                <div class="drag-item" id="drag-female" draggable="true"
                     ondragstart="handleDragStart(event, '女')"
                     ondragend="handleDragEnd(event)">女</div>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn btn-reset" onclick="resetGame1()">🔄 清除再做</button>
                <button class="action-btn btn-save" onclick="saveGame1()">✓ 儲存</button>
            </div>
        </div>
        
        <!-- Tab 2: 顏色配對 -->
        <div id="game2-content" class="tab-content">
            <div class="game-instruction">將相同顏色的蝴蝶結拖過去</div>
            
            <div class="color-game-container" id="match-section">
                <div class="color-target-row">
                    <div class="color-target" id="target-red"
                         ondragover="handleColorDragOver(event)"
                         ondragleave="handleColorDragLeave(event)"
                         ondrop="handleColorDrop(event, 'red')"></div>
                    <div class="color-target" id="target-yellow"
                         ondragover="handleColorDragOver(event)"
                         ondragleave="handleColorDragLeave(event)"
                         ondrop="handleColorDrop(event, 'yellow')"></div>
                </div>
                <div class="color-target-row">
                    <div class="color-target" id="target-blue"
                         ondragover="handleColorDragOver(event)"
                         ondragleave="handleColorDragLeave(event)"
                         ondrop="handleColorDrop(event, 'blue')"></div>
                    <div class="color-target" id="target-green"
                         ondragover="handleColorDragOver(event)"
                         ondragleave="handleColorDragLeave(event)"
                         ondrop="handleColorDrop(event, 'green')"></div>
                </div>
                
                <div class="color-drag-source" id="butterfly-source">
                    <div class="color-butterfly butterfly-red" id="bf-red" draggable="true"
                         ondragstart="handleButterflyDragStart(event, 'red')"
                         ondragend="handleButterflyDragEnd(event)">🦋</div>
                    <div class="color-butterfly butterfly-yellow" id="bf-yellow" draggable="true"
                         ondragstart="handleButterflyDragStart(event, 'yellow')"
                         ondragend="handleButterflyDragEnd(event)">🦋</div>
                    <div class="color-butterfly butterfly-blue" id="bf-blue" draggable="true"
                         ondragstart="handleButterflyDragStart(event, 'blue')"
                         ondragend="handleButterflyDragEnd(event)">🦋</div>
                    <div class="color-butterfly butterfly-green" id="bf-green" draggable="true"
                         ondragstart="handleButterflyDragStart(event, 'green')"
                         ondragend="handleButterflyDragEnd(event)">🦋</div>
                </div>
                
                <div class="action-buttons">
                    <button class="action-btn btn-reset" onclick="resetGame2Match()">🔄 清除再做</button>
                    <button class="action-btn btn-next" onclick="goToTrace()">下一步 →</button>
                </div>
            </div>
            
            <div class="trace-section" id="trace-section">
                <div class="trace-title">跟隨虛線連線（橫線訓練）</div>
                
                <div class="trace-box"><div class="trace-line" id="trace-1" onclick="doTrace(1)"></div></div>
                <div class="trace-box"><div class="trace-line" id="trace-2" onclick="doTrace(2)"></div></div>
                <div class="trace-box"><div class="trace-line" id="trace-3" onclick="doTrace(3)"></div></div>
                <div class="trace-box"><div class="trace-line" id="trace-4" onclick="doTrace(4)"></div></div>
                
                <div class="action-buttons">
                    <button class="action-btn btn-reset" onclick="resetTrace()">🔄 清除再做</button>
                    <button class="action-btn btn-save" onclick="saveGame2()">✓ 儲存</button>
                </div>
            </div>
        </div>
        
        <!-- Tab 3: 女字書寫 -->
        <div id="game3-content" class="tab-content">
            <div class="game-instruction">點擊每一步，跟隨筆順書寫</div>
            
            <div class="stroke-demo">
                <div class="big-character">女</div>
                <div class="stroke-hint">女字共有 3 筆</div>
            </div>
            
            <div class="stroke-grid" id="stroke-grid">
                <div class="stroke-step" id="step-1" onclick="doStroke(1)">
                    <div class="stroke-num">1</div>
                    <div class="stroke-info">
                        <div class="stroke-name">橫</div>
                        <div class="stroke-direction">由左至右 →</div>
                    </div>
                    <div class="stroke-visual">一</div>
                </div>
                <div class="stroke-step" id="step-2" onclick="doStroke(2)">
                    <div class="stroke-num">2</div>
                    <div class="stroke-info">
                        <div class="stroke-name">撇</div>
                        <div class="stroke-direction">由右上至左下 ↙</div>
                    </div>
                    <div class="stroke-visual">丿</div>
                </div>
                <div class="stroke-step" id="step-3" onclick="doStroke(3)">
                    <div class="stroke-num">3</div>
                    <div class="stroke-info">
                        <div class="stroke-name">捺</div>
                        <div class="stroke-direction">由左上至右下 ↘</div>
                    </div>
                    <div class="stroke-visual">㇏</div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn btn-reset" onclick="resetGame3()">🔄 清除再做</button>
                <button class="action-btn btn-save" onclick="saveGame3()">✓ 儲存</button>
            </div>
        </div>
    </div>
    
    <!-- ===== 數學/英文 示範頁面 ===== -->
    <div id="math-week1" class="game-page">
        <div class="game-header">
            <button class="back-btn" onclick="goBackToWeeks('math')">🔙 返回</button>
            <div class="game-week-badge">第 1 週</div>
            <h2 class="game-subject-title">🔢 數學</h2>
        </div>
        <div style="text-align:center;padding:50px;color:#888;">
            <div style="font-size:60px;">🚧</div>
            <div style="font-size:20px;margin-top:20px;">敬請期待...</div>
        </div>
    </div>
    
    <div id="english-week1" class="game-page">
        <div class="game-header">
            <button class="back-btn" onclick="goBackToWeeks('english')">🔙 返回</button>
            <div class="game-week-badge">第 1 週</div>
            <h2 class="game-subject-title">🔤 英文</h2>
        </div>
        <div style="text-align:center;padding:50px;color:#888;">
            <div style="font-size:60px;">🚧</div>
            <div style="font-size:20px;margin-top:20px;">Coming soon...</div>
        </div>
    </div>
    
    <!-- ===== 表揚畫面 ===== -->
    <div id="celebration" class="celebration" onclick="hideCelebration()">
        <div class="celebration-text">🎉 你叻晒！ 🎉</div>
        <div class="celebration-sub" id="celebration-sub">完成！</div>
        <button class="celebration-btn" onclick="event.stopPropagation();hideCelebration();">再玩過</button>
    </div>
    
    <div id="save-toast" class="save-toast">✓ 已儲存</div>
    
<script src="app.js"></script>
</body>
</html>
