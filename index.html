<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📖 聖經故事 — 幼兒聖經教育</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; touch-action: manipulation; }

:root {
  --primary: #6C5CE7;
  --old-testament: #8B4513;
  --new-testament: #C41E3A;
  --gold: #FFD700;
  --shadow: 0 4px 20px rgba(0,0,0,0.2);
  --radius: 24px;
}

body {
  font-family: 'Noto Sans TC', 'PingFang HK', 'Microsoft JhengHei', sans-serif;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  height: 100vh; width: 100vw;
  position: relative; overflow: hidden;
  color: white;
}

/* NAVBAR */
#navbar { position: fixed; top: 12px; left: 10px; right: 10px; z-index: 999; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
.nav-title { font-size: 1.3rem; font-weight: 700; color: var(--gold); text-shadow: 0 2px 8px rgba(255,215,0,0.3); }
#lang-wrap { position: relative; }
.nav-btn { background: rgba(255,255,255,0.9); border: none; border-radius: 12px; padding: 8px 14px; font-size: 1rem; cursor: pointer; box-shadow: var(--shadow); }

/* MAIN LAYOUT */
.main-layout {
  display: flex;
  height: 100vh;
  padding-top: 70px;
  transition: all 0.5s ease;
}

/* OLD TESTAMENT SIDE */
.old-testament {
  flex: 0 0 75%;
  max-width: 75%;
  padding: 20px;
  overflow-y: auto;
  transition: all 0.5s ease;
  position: relative;
}

.old-testament.collapsed {
  flex: 0 0 25%;
  max-width: 25%;
  padding: 15px 10px;
}

.old-testament.collapsed .section-title,
.old-testament.collapsed .stories-grid,
.old-testament.collapsed .story-preview {
  display: none;
}

.new-testament.collapsed .section-title,
.new-testament.collapsed .stories-grid,
.new-testament.collapsed .story-preview {
  display: none;
}

.old-testament.collapsed .stories-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* SECTION TITLE */
.section-title {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid rgba(255,255,255,0.2);
}

.section-icon { font-size: 2rem; }
.section-title h2 { font-size: 1.5rem; font-weight: 800; color: var(--gold); }
.section-title span { font-size: 0.9rem; opacity: 0.7; }

/* STORIES LIST (collapsed mode only) */
.old-testament:not(.collapsed) .stories-list {
  display: none;
}

.old-testament.collapsed .stories-list {
  display: flex;
}

.new-testament:not(.collapsed) .testament-toggle {
  display: none;
}

.new-testament.collapsed .testament-toggle {
  display: flex;
}

.story-list-item {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.story-list-item:active {
  transform: scale(0.95);
  background: rgba(255,255,255,0.2);
}

.story-list-item .list-icon { font-size: 1.5rem; margin-bottom: 4px; }
.story-list-item .list-name { font-size: 0.8rem; }

/* DIVIDER */
.divider {
  width: 4px;
  background: linear-gradient(180deg, var(--gold), var(--primary));
  transition: all 0.5s ease;
  cursor: pointer;
  flex-shrink: 0;
}

.divider:hover {
  background: linear-gradient(180deg, #fff, var(--gold));
}

/* NEW TESTAMENT SIDE */
.new-testament {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  transition: all 0.5s ease;
  position: relative;
}

.new-testament.collapsed {
  padding: 15px 10px;
}

.new-testament.collapsed .section-title,
.new-testament.collapsed .stories-grid,
.new-testament.collapsed .story-preview {
  display: none;
}

.new-testament.collapsed .testament-toggle {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.testament-header {
  text-align: center;
  padding: 16px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s;
}

.testament-header:hover {
  background: rgba(255,255,255,0.15);
}

.testament-header .header-icon {
  font-size: 2rem;
  margin-bottom: 6px;
}

.testament-header .header-title {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.testament-header .header-hint {
  font-size: 0.75rem;
  opacity: 0.7;
}

/* TESTAMENT TOGGLE (shown when collapsed) */
.testament-toggle {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.testament-toggle .toggle-btn {
  background: rgba(196, 30, 58, 0.3);
  border: 2px solid var(--new-testament);
  border-radius: 16px;
  padding: 12px 16px;
  color: white;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.testament-toggle .toggle-btn:active {
  transform: scale(0.95);
  background: rgba(196, 30, 58, 0.5);
}

.testament-toggle .toggle-icon { font-size: 1.8rem; }
.testament-toggle .toggle-name { font-size: 0.9rem; margin-top: 4px; }

/* STORIES GRID */
.stories-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 16px;
}

/* STORY CARD */
.story-card {
  background: rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  border: 2px solid transparent;
}

.story-card:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-3px);
  border-color: rgba(255,215,0,0.4);
}

.story-card:active {
  transform: scale(0.95);
}

.story-card.selected {
  border-color: var(--gold);
  background: rgba(255,215,0,0.15);
}

.story-card.disabled {
  opacity: 0.55;
  cursor: default;
}

.story-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
.story-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
.story-desc { font-size: 0.8rem; opacity: 0.7; }

/* STORY PREVIEW (shown when card selected) */
.story-preview {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: linear-gradient(135deg, #2d2d4a 0%, #1a1a2e 100%);
  border-radius: var(--radius);
  padding: 30px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  z-index: 1000;
  border: 2px solid rgba(255,215,0,0.3);
}

.story-preview.show {
  display: block;
  animation: popIn 0.3s ease;
}

@keyframes popIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

.preview-icon { font-size: 4rem; text-align: center; margin-bottom: 15px; }
.preview-title { font-size: 1.5rem; font-weight: 800; text-align: center; color: var(--gold); margin-bottom: 10px; }
.preview-desc { font-size: 1rem; line-height: 1.6; text-align: center; margin-bottom: 20px; color: rgba(255,255,255,0.9); }

.enter-btn {
  display: block;
  width: 100%;
  background: linear-gradient(135deg, var(--primary), #5a4fcf);
  color: white;
  border: none;
  border-radius: 16px;
  padding: 14px 20px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: transform 0.2s;
}

.enter-btn:active {
  transform: scale(0.95);
}

.close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 1.2rem;
  cursor: pointer;
  color: white;
}

/* OVERLAY */
.overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 999;
  pointer-events: none;
}

.overlay.show {
  display: block;
  pointer-events: auto;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .old-testament { flex: 0 0 65%; max-width: 65%; }
  .old-testament.collapsed { flex: 0 0 35%; max-width: 35%; }
  .stories-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .story-card { padding: 12px; }
  .story-icon { font-size: 2.5rem; }
  .story-preview { padding: 20px; width: 95%; }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }

/* FEEDBACK BUTTON */
.feedback-btn {
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: var(--shadow);
  margin-right: 8px;
}

/* FEEDBACK MODAL */
.feedback-modal {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: linear-gradient(135deg, #2d2d4a 0%, #1a1a2e 100%);
  border-radius: var(--radius);
  padding: 28px 24px 24px;
  width: 92%;
  max-width: 420px;
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  z-index: 1100;
  border: 2px solid rgba(255,215,0,0.3);
  color: white;
}

.feedback-modal.show {
  display: block;
  animation: popIn 0.3s ease;
}

.feedback-modal h3 {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--gold);
  margin-bottom: 18px;
  text-align: center;
}

.feedback-modal .close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
}

.feedback-field {
  margin-bottom: 16px;
}

.feedback-field label {
  display: block;
  font-size: 0.9rem;
  margin-bottom: 6px;
  opacity: 0.85;
}

.feedback-field select,
.feedback-field textarea {
  width: 100%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 0.95rem;
  color: white;
  font-family: inherit;
  resize: none;
  outline: none;
  box-sizing: border-box;
}

.feedback-field select option {
  background: #2d2d4a;
  color: white;
}

.feedback-field textarea::placeholder {
  color: rgba(255,255,255,0.4);
}

/* STAR RATING */
.star-rating {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 4px 0;
}

.star-rating .star {
  font-size: 2rem;
  cursor: pointer;
  opacity: 0.35;
  transition: opacity 0.15s, transform 0.15s;
  user-select: none;
}

.star-rating .star.active {
  opacity: 1;
}

.star-rating .star:active {
  transform: scale(1.2);
}

/* SUBMIT BUTTON */
.feedback-submit {
  display: block;
  width: 100%;
  background: linear-gradient(135deg, var(--primary), #5a4fcf);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 14px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  font-family: inherit;
  transition: transform 0.2s;
}

.feedback-submit:active {
  transform: scale(0.97);
}

/* SUCCESS MESSAGE */
.feedback-success {
  display: none;
  text-align: center;
  padding: 20px 0 8px;
}

.feedback-success .success-icon {
  font-size: 3.5rem;
  margin-bottom: 12px;
}

.feedback-success p {
  font-size: 1rem;
  line-height: 1.6;
  opacity: 0.9;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav id="navbar">
  <span class="nav-title">📖 聖經故事</span>
  <div style="display:flex;align-items:center;gap:6px;">
    <button class="feedback-btn" onclick="openFeedback()" id="feedback-nav-btn"></button>
    <div id="lang-wrap">
      <button class="nav-btn" onclick="toggleLang()">🌐 粵</button>
      <div id="lang-menu" style="display:none;position:absolute;top:110%;right:0;background:white;border-radius:12px;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,0.2);">
        <button class="lang-btn" onclick="setLang('zhHK')" style="background:var(--primary)">🌐 粵</button>
        <button class="lang-btn" onclick="setLang('zhCN')" style="background:#666">簡</button>
        <button class="lang-btn" onclick="setLang('en')" style="background:#666">EN</button>
        <button class="lang-btn" onclick="setLang('ja')" style="background:#666">日</button>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN LAYOUT -->
<div class="main-layout" id="main-layout">
  
  <!-- OLD TESTAMENT -->
  <div class="old-testament" id="old-testament">
    <div class="section-title">
      <span class="section-icon">📜</span>
      <div>
        <h2>舊約聖經</h2>
        <span>創世記、出埃及記...</span>
      </div>
    </div>
    
    <div class="stories-grid" id="old-stories-grid">
      <!-- Stories will be populated by JS -->
    </div>
    
    <div class="stories-list" id="old-stories-list" onclick="expandTestament('old')" style="cursor:pointer;display:flex;flex-direction:column;gap:8px;">
      <div class="story-list-item" style="background:rgba(255,255,255,0.1);border-radius:12px;padding:16px;text-align:center;">

        <div style="font-size:0.9rem;margin-top:4px;">舊約聖經</div>

    </div>
  </div>

      <div>
        <h2>新約聖經</h2>
        <span>福音書、書信...</span>
      </div>
    </div>
    
    <div class="stories-grid" id="new-stories-grid">
      <!-- Stories will be populated by JS -->

    <div class="testament-toggle" id="new-toggles" onclick="expandTestament('new')" style="cursor:pointer;">
      <div style="text-align:center;padding:16px;">
        <div style="font-size:1.8rem;">✨</div>
        <div style="font-size:0.9rem;margin-top:4px;">新約聖經</div>
        <div style="font-size:0.7rem;opacity:0.7;margin-top:4px;">👈 點擊展開</div>
      </div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closePreview()"></div>

<!-- WELCOME OVERLAY -->
<div class="overlay show" id="welcome-overlay" style="background:linear-gradient(180deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;color:white;padding:20px;max-width:400px;">
    <div style="font-size:4rem;margin-bottom:20px;">📖</div>
    <h1 style="font-size:1.8rem;margin-bottom:10px;text-shadow:0 2px 12px rgba(255,215,0,0.5);">聖經故事</h1>
    <p style="opacity:0.8;margin-bottom:30px;">幼兒聖經故事互動學習平台</p>
    <p style="margin-bottom:20px;">請選擇語言：</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="lang-btn" onclick="welcomeSetLang('zhHK')" style="background:var(--primary);padding:12px 24px;font-size:1.1rem;">🌐 粵語</button>
      <button class="lang-btn" onclick="welcomeSetLang('zhCN')" style="background:#666;padding:12px 24px;font-size:1.1rem;">🌐 普通話</button>
      <button class="lang-btn" onclick="welcomeSetLang('en')" style="background:#666;padding:12px 24px;font-size:1.1rem;">🌐 English</button>
      <button class="lang-btn" onclick="welcomeSetLang('ja')" style="background:#666;padding:12px 24px;font-size:1.1rem;">🌐 日本語</button>
    </div>
  </div>
</div>

<!-- STORY PREVIEW -->
<div class="story-preview" id="story-preview">
  <button class="close-btn" onclick="closePreview()">✕</button>
  <div class="preview-icon" id="preview-icon"></div>
  <div class="preview-title" id="preview-title"></div>
  <div class="preview-desc" id="preview-desc"></div>
  <button class="enter-btn" id="enter-btn" onclick="enterStory()">進入遊戲 ▶</button>
</div>

<!-- FEEDBACK OVERLAY -->
<div class="overlay" id="feedback-overlay" onclick="closeFeedback()"></div>

<!-- FEEDBACK MODAL -->
<div class="feedback-modal" id="feedback-modal">
  <button class="close-btn" onclick="closeFeedback()">✕</button>

  <!-- Form view -->
  <div id="feedback-form-view">
    <h3 id="feedback-title"></h3>

    <div class="feedback-field">
      <label id="feedback-label-story"></label>
      <select id="feedback-story">

    <div class="feedback-field">
      <label id="feedback-label-rating"></label>
      <div class="star-rating" id="star-rating">
        <span class="star" data-value="1" onclick="setRating(1)">★</span>
        <span class="star" data-value="2" onclick="setRating(2)">★</span>
        <span class="star" data-value="3" onclick="setRating(3)">★</span>
        <span class="star" data-value="4" onclick="setRating(4)">★</span>
        <span class="star" data-value="5" onclick="setRating(5)">★</span>
      </div>
    </div>

    <div class="feedback-field">
      <label id="feedback-label-enjoy"></label>
      <textarea id="feedback-enjoy" rows="2"></textarea>
    </div>

    <div class="feedback-field">
      <label id="feedback-label-improve"></label>
      <textarea id="feedback-improve" rows="2"></textarea>
    </div>

    <button class="feedback-submit" id="feedback-submit-btn" onclick="submitFeedback()"></button>
  </div>

  <!-- Success view -->
  <div class="feedback-success" id="feedback-success-view">
    <div class="success-icon">🙏</div>
    <h3 id="feedback-thanks"></h3>
    <p id="feedback-thanks-msg"></p>
  </div>
</div>

// Render stories in grids
function renderStories() {
  const oldGrid = document.getElementById('old-stories-grid');
  const newGrid = document.getElementById('new-stories-grid');
  const oldList = document.getElementById('old-stories-list');
  const newToggles = document.getElementById('new-toggles');
  
  // Old Testament Grid
  oldGrid.innerHTML = stories.oldTestament.map(story => `
    <div class="story-card ${story.available ? '' : 'disabled'}" 
         data-id="${story.id}"
         onclick="selectStory('old', '${story.id}')">
      ${story.iconImg ? `<img src="${story.iconImg}" class="story-icon-img" alt="${story.name}" style="width:60px;height:60px;border-radius:12px;object-fit:contain;">` : `<span class="story-icon">${story.icon}</span>`}
      <div class="story-name">${story.name}</div>
      <div class="story-desc">${story.available ? '✅ 可遊玩' : '🚧 準備中'}</div>
    </div>
  `).join('');
  
  // New Testament Grid
  newGrid.innerHTML = stories.newTestament.map(story => `
    <div class="story-card ${story.available ? '' : 'disabled'}" 
         data-id="${story.id}"
         onclick="selectStory('new', '${story.id}')">
      <span class="story-icon">${story.icon}</span>
      <div class="story-name">${story.name}</div>
      <div class="story-desc">${story.available ? '✅ 可遊玩' : '🚧 準備中'}</div>
    </div>
  `).join('');
  
  // Old Testament Collapsed List - show a single clickable header
  oldList.innerHTML = `
    <div class="testament-header" onclick="expandTestament('old')">
      <div class="header-icon">📜</div>
      <div class="header-title">舊約聖經</div>
      <div class="header-hint">👈 點擊展開</div>
    </div>
  `;
  
  // New Testament Collapsed Toggles - show a single clickable header
  newToggles.innerHTML = `
    <div class="testament-header" onclick="expandTestament('new')">
      <div class="header-icon">✨</div>
      <div class="header-title">新約聖經</div>
      <div class="header-hint">👈 點擊展開</div>
    </div>
  `;
}

// Select story
function selectStory(testament, storyId) {
  const storyList = testament === 'old' ? stories.oldTestament : stories.newTestament;
  const story = storyList.find(s => s.id === storyId);
  if (!story) return;
  
  selectedStory = story;
  
  // Update preview content
  const previewIcon = document.getElementById('preview-icon');
  if (story.iconImg) {
    previewIcon.innerHTML = `<img src="${story.iconImg}" style="width:80px;height:80px;border-radius:16px;object-fit:contain;" alt="${story.name}">`;
  } else {
    previewIcon.textContent = story.icon;
  }
  document.getElementById('preview-title').textContent = story.name;
  document.getElementById('preview-desc').textContent = story.desc;
  
  // Update enter button
  const enterBtn = document.getElementById('enter-btn');
  if (story.available) {
    enterBtn.textContent = '進入遊戲 ▶';
    enterBtn.style.opacity = '1';
    enterBtn.onclick = () => enterStory();
  } else {
    enterBtn.textContent = '🚧 準備中...';
    enterBtn.style.opacity = '0.5';
    enterBtn.onclick = null;
  }
  
  // Show preview
  document.getElementById('overlay').classList.add('show');
  document.getElementById('story-preview').classList.add('show');
  
  // Update card selection
  document.querySelectorAll('.story-card').forEach(card => card.classList.remove('selected'));
  // Also clear from list/toggle items
  document.querySelectorAll('.story-list-item, .toggle-btn').forEach(el => el.classList.remove('selected'));
  // Find the clicked element safely
  const clicked = event?.currentTarget;
  if (clicked) clicked.classList.add('selected');
  // Highlight matching card in grid
  const cardEl = document.querySelector(`.story-card[data-id="${storyId}"]`);
  if (cardEl) cardEl.classList.add('selected');
}

// Close preview
function closePreview() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('story-preview').classList.remove('show');
  document.querySelectorAll('.story-card').forEach(card => card.classList.remove('selected'));
  selectedStory = null;
}

// Enter story
function enterStory() {
  if (!selectedStory || !selectedStory.available) return;
  window.location.href = selectedStory.page;
}

// Toggle testaments
function toggleTestaments() {
  isOldTestamentExpanded = !isOldTestamentExpanded;
  
  const oldTestament = document.getElementById('old-testament');
  const newTestament = document.getElementById('new-testament');
  
  if (isOldTestamentExpanded) {
    // Show old testament (75%), collapse new testament (25%)
    oldTestament.classList.remove('collapsed');
    newTestament.classList.add('collapsed');
  } else {
    // Show new testament (75%), collapse old testament (25%)
    newTestament.classList.remove('collapsed');
    oldTestament.classList.add('collapsed');
  }
}

// Click on collapsed testament to expand it
function expandTestament(testament) {
  const oldTestament = document.getElementById('old-testament');
  const newTestament = document.getElementById('new-testament');
  
  if (testament === 'old' && oldTestament.classList.contains('collapsed')) {
    isOldTestamentExpanded = true;
    oldTestament.classList.remove('collapsed');
    newTestament.classList.add('collapsed');
  } else if (testament === 'new' && newTestament.classList.contains('collapsed')) {
    isOldTestamentExpanded = false;
    newTestament.classList.remove('collapsed');
    oldTestament.classList.add('collapsed');
  }
}

// Language toggle
function toggleLang() {
  const menu = document.getElementById('lang-menu');
  menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';

function updateLangUI() {

  document.querySelector('#new-testament .section-title h2').textContent = langNames.newTestament[currentLang];
  document.querySelector('#new-testament .section-title span').textContent = langNames.subtitle.newTestament[currentLang];
  updateFeedbackUI();
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('preschoolLang', lang);
  document.getElementById('lang-menu').style.display = 'none';

}

function updateFeedbackUI() {

  document.getElementById('feedback-thanks').textContent = t.thanks;

  const sel = document.getElementById('feedback-story');
  const storyValues = ['', 'creation', 'noah', 'moses', 'general'];
  storyValues.forEach((val, i) => {
    if (i < t.storyOptions.length && sel.options[i]) {
      sel.options[i].text = t.storyOptions[i];
    }
  });
}

function openFeedback() {
  // Reset form
  feedbackRating = 0;
  document.getElementById('feedback-story').value = '';
  document.getElementById('feedback-enjoy').value = '';
  document.getElementById('feedback-improve').value = '';
  document.querySelectorAll('#star-rating .star').forEach(s => s.classList.remove('active'));
  document.getElementById('feedback-form-view').style.display = 'block';
  document.getElementById('feedback-success-view').style.display = 'none';

  document.getElementById('feedback-overlay').classList.add('show');
  document.getElementById('feedback-modal').classList.add('show');
}

function closeFeedback() {
  document.getElementById('feedback-overlay').classList.remove('show');
  document.getElementById('feedback-modal').classList.remove('show');
}

function setRating(value) {
  feedbackRating = value;
  document.querySelectorAll('#star-rating .star').forEach(star => {
    star.classList.toggle('active', parseInt(star.dataset.value) <= value);
  });
}

function submitFeedback() {
  const story = document.getElementById('feedback-story').value;
  const enjoy = document.getElementById('feedback-enjoy').value.trim();
  const improve = document.getElementById('feedback-improve').value.trim();

  // Basic validation: require at least a star rating
  if (feedbackRating === 0) {
    document.getElementById('feedback-label-rating').style.color = '#ff6b6b';
    setTimeout(() => {
      document.getElementById('feedback-label-rating').style.color = '';
    }, 1500);
    return;
  }

  // Save to localStorage with error handling
  const entry = {
    ts: new Date().toISOString(),
    lang: currentLang,
    story,
    rating: feedbackRating,
    enjoy,
    improve
  };
  const key = 'preschoolFeedback';
  try {
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    existing.push(entry);
    localStorage.setItem(key, JSON.stringify(existing));
  } catch (e) {
    // localStorage unavailable or parse error — continue to show success anyway
  }

  // Show success
  document.getElementById('feedback-form-view').style.display = 'none';
  document.getElementById('feedback-success-view').style.display = 'block';

  // Auto-close after 2.5s
  setTimeout(closeFeedback, 2500);
}
