<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📖 聖經故事 — 幼兒聖經教育</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; touch-action: manipulation; }

:root {
  --primary: #6C5CE7;
  --old-testament: #8B4513;
  --new-testament: #C41E3A;
  --gold: #FFD700;
  --shadow: 0 4px 20px rgba(0,0,0,0.2);
  --radius: 24px;
}

body {
  font-family: 'Noto Sans TC', 'PingFang HK', 'Microsoft JhengHei', sans-serif;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  height: 100vh; width: 100vw;
  position: relative; overflow: hidden;
  color: white;
}

/* NAVBAR */
#navbar { position: fixed; top: 12px; left: 10px; right: 10px; z-index: 999; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
.nav-title { font-size: 1.3rem; font-weight: 700; color: var(--gold); text-shadow: 0 2px 8px rgba(255,215,0,0.3); }
#lang-wrap { position: relative; }
.nav-btn { background: rgba(255,255,255,0.9); border: none; border-radius: 12px; padding: 8px 14px; font-size: 1rem; cursor: pointer; box-shadow: var(--shadow); }

/* MAIN LAYOUT */
.main-layout {
  display: flex;
  height: 100vh;
  padding-top: 70px;
  transition: all 0.5s ease;
}

/* OLD TESTAMENT SIDE */
.old-testament {
  flex: 0 0 75%;
  max-width: 75%;
  padding: 20px;
  overflow-y: auto;
  transition: all 0.5s ease;
  position: relative;
}

.old-testament.collapsed {
  flex: 0 0 25%;
  max-width: 25%;
  padding: 15px 10px;
}

.old-testament.collapsed .section-title,
.old-testament.collapsed .stories-grid,
.old-testament.collapsed .story-preview {
  display: none;
}

.old-testament.collapsed .stories-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* SECTION TITLE */
.section-title {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid rgba(255,255,255,0.2);
}

.section-icon { font-size: 2rem; }
.section-title h2 { font-size: 1.5rem; font-weight: 800; color: var(--gold); }
.section-title span { font-size: 0.9rem; opacity: 0.7; }

/* STORIES LIST (collapsed mode) */
.stories-list {
  display: none;
}

.story-list-item {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.story-list-item:active {
  transform: scale(0.95);
  background: rgba(255,255,255,0.2);
}

.story-list-item .list-icon { font-size: 1.5rem; margin-bottom: 4px; }
.story-list-item .list-name { font-size: 0.8rem; }

/* DIVIDER */
.divider {
  width: 4px;
  background: linear-gradient(180deg, var(--gold), var(--primary));
  transition: all 0.5s ease;
  cursor: pointer;
  flex-shrink: 0;
}

.divider:hover {
  background: linear-gradient(180deg, #fff, var(--gold));
}

/* NEW TESTAMENT SIDE */
.new-testament {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  transition: all 0.5s ease;
  position: relative;
}

.new-testament.collapsed {
  padding: 15px 10px;
}

.new-testament.collapsed .section-title,
.new-testament.collapsed .stories-grid,
.new-testament.collapsed .story-preview {
  display: none;
}

.new-testament.collapsed .testament-toggle {
  display: flex;
}

/* TESTAMENT TOGGLE (shown when collapsed) */
.testament-toggle {
  display: none;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.testament-toggle .toggle-btn {
  background: rgba(196, 30, 58, 0.3);
  border: 2px solid var(--new-testament);
  border-radius: 16px;
  padding: 12px 16px;
  color: white;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.testament-toggle .toggle-btn:active {
  transform: scale(0.95);
  background: rgba(196, 30, 58, 0.5);
}

.testament-toggle .toggle-icon { font-size: 1.8rem; }
.testament-toggle .toggle-name { font-size: 0.9rem; margin-top: 4px; }

/* STORIES GRID */
.stories-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 16px;
}

/* STORY CARD */
.story-card {
  background: rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  border: 2px solid transparent;
}

.story-card:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-3px);
  border-color: rgba(255,215,0,0.4);
}

.story-card:active {
  transform: scale(0.95);
}

.story-card.selected {
  border-color: var(--gold);
  background: rgba(255,215,0,0.15);
}

.story-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
.story-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
.story-desc { font-size: 0.8rem; opacity: 0.7; }

/* STORY PREVIEW (shown when card selected) */
.story-preview {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: linear-gradient(135deg, #2d2d4a 0%, #1a1a2e 100%);
  border-radius: var(--radius);
  padding: 30px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  z-index: 1000;
  border: 2px solid rgba(255,215,0,0.3);
}

.story-preview.show {
  display: block;
  animation: popIn 0.3s ease;
}

@keyframes popIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

.preview-icon { font-size: 4rem; text-align: center; margin-bottom: 15px; }
.preview-title { font-size: 1.5rem; font-weight: 800; text-align: center; color: var(--gold); margin-bottom: 10px; }
.preview-desc { font-size: 1rem; line-height: 1.6; text-align: center; margin-bottom: 20px; color: rgba(255,255,255,0.9); }

.enter-btn {
  display: block;
  width: 100%;
  background: linear-gradient(135deg, var(--primary), #5a4fcf);
  color: white;
  border: none;
  border-radius: 16px;
  padding: 14px 20px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: transform 0.2s;
}

.enter-btn:active {
  transform: scale(0.95);
}

.close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 1.2rem;
  cursor: pointer;
  color: white;
}

/* OVERLAY */
.overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 999;
}

.overlay.show {
  display: block;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .old-testament { flex: 0 0 65%; max-width: 65%; }
  .old-testament.collapsed { flex: 0 0 35%; max-width: 35%; }
  .stories-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .story-card { padding: 12px; }
  .story-icon { font-size: 2.5rem; }
  .story-preview { padding: 20px; width: 95%; }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav id="navbar">
  <span class="nav-title">📖 聖經故事</span>
  <div id="lang-wrap">
    <button class="nav-btn" onclick="toggleLang()">🌐 粵</button>
    <div id="lang-menu" style="display:none;position:absolute;top:110%;right:0;background:white;border-radius:12px;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,0.2);">
      <button class="lang-btn" onclick="setLang('zhHK')" style="background:var(--primary)">🌐 粵</button>
      <button class="lang-btn" onclick="setLang('zhCN')" style="background:#666">簡</button>
      <button class="lang-btn" onclick="setLang('en')" style="background:#666">EN</button>
    </div>
  </div>
</nav>

<!-- MAIN LAYOUT -->
<div class="main-layout" id="main-layout">
  
  <!-- OLD TESTAMENT -->
  <div class="old-testament" id="old-testament">
    <div class="section-title">
      <span class="section-icon">📜</span>
      <div>
        <h2>舊約聖經</h2>
        <span>創世記、出埃及記...</span>
      </div>
    </div>
    
    <div class="stories-grid" id="old-stories-grid">
      <!-- Stories will be populated by JS -->
    </div>
    
    <div class="stories-list" id="old-stories-list">
      <!-- Shown when collapsed -->
    </div>
  </div>
  
  <!-- DIVIDER -->
  <div class="divider" id="divider" onclick="toggleTestaments()"></div>
  
  <!-- NEW TESTAMENT -->
  <div class="new-testament collapsed" id="new-testament">
    <div class="section-title">
      <span class="section-icon">✨</span>
      <div>
        <h2>新約聖經</h2>
        <span>福音書、書信...</span>
      </div>
    </div>
    
    <div class="stories-grid" id="new-stories-grid">
      <!-- Stories will be populated by JS -->
    </div>
    
    <div class="testament-toggle" id="new-toggles">
      <!-- Shown when collapsed -->
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closePreview()"></div>

<!-- STORY PREVIEW -->
<div class="story-preview" id="story-preview">
  <button class="close-btn" onclick="closePreview()">✕</button>
  <div class="preview-icon" id="preview-icon"></div>
  <div class="preview-title" id="preview-title"></div>
  <div class="preview-desc" id="preview-desc"></div>
  <button class="enter-btn" id="enter-btn" onclick="enterStory()">進入遊戲 ▶</button>
</div>

<script>
// Stories Data
const stories = {
  oldTestament: [
    {
      id: 'creation',
      icon: '✨',
      iconImg: 'img/creation-icon.png',
      name: '神的創造',
      nameCN: '神的創造',
      nameEN: "God's Creation",
      desc: '神用六日創造天地萬物，第一日創造光，第二日創造天空...',
      descCN: '神用六日創造天地萬物，第一日創造光，第二日創造天空...',
      descEN: 'God created heaven and earth in six days. On the first day, He created light...',
      page: 'creation_game.html',
      available: true
    },
    {
      id: 'noah',
      icon: '🐘',
      iconImg: 'img/noah-icon.png',
      name: '挪亞方舟',
      nameCN: '挪亞方舟',
      nameEN: "Noah's Ark",
      desc: '神叫挪亞建造方舟，帶埋動物躲避大洪水...',
      descCN: '神叫挪亞建造方舟，帶埋動物躲避大洪水...',
      descEN: 'God told Noah to build an ark to save animals from the great flood...',
      page: 'noah_game.html',
      available: true
    },
    {
      id: 'moses',
      icon: '🌊',
      name: '摩西過紅海',
      nameCN: '摩西過紅海',
      nameEN: 'Moses & Red Sea',
      desc: '摩西帶領以色列人過紅海，神分開海水...',
      descCN: '摩西帶領以色列人過紅海，神分開海水...',
      descEN: 'Moses led Israel through the Red Sea. God divided the waters...',
      page: '#',
      available: false
    },
    {
      id: 'david',
      icon: '🐑',
      name: '大衛與歌利亞',
      nameCN: '大衛與歌利亞',
      nameEN: 'David & Goliath',
      desc: '少年大衛用甩石戰勝巨人歌利亞...',
      descCN: '少年大衛用甩石戰勝巨人歌利亞...',
      descEN: 'Young David defeated the giant Goliath with a sling...',
      page: '#',
      available: false
    }
  ],
  newTestament: [
    {
      id: 'jesus-birth',
      icon: '⭐',
      name: '耶穌降生',
      nameCN: '耶穌降生',
      nameEN: 'Birth of Jesus',
      desc: '天使向馬利亞報信，耶穌生在伯利恆...',
      descCN: '天使向馬利亞報信，耶穌生在伯利恆...',
      descEN: 'The angel told Mary that Jesus would be born in Bethlehem...',
      page: '#',
      available: false
    },
    {
      id: 'feeding',
      icon: '🐟',
      name: '五餅二魚',
      nameCN: '五餅二魚',
      nameEN: 'Feeding 5000',
      desc: '耶穌用五餅二魚餵饱五千人...',
      descCN: '耶穌用五餅二魚餵饱五千人...',
      descEN: 'Jesus fed 5000 people with five loaves and two fish...',
      page: '#',
      available: false
    },
    {
      id: 'resurrection',
      icon: '🐰',
      name: '耶穌復活',
      nameCN: '耶穌復活',
      nameEN: 'Jesus Rises',
      desc: '耶穌被釘死後第三日復活...',
      descCN: '耶穌被釘死後第三日復活...',
      descEN: 'Jesus rose from the dead on the third day after His crucifixion...',
      page: '#',
      available: false
    },
    {
      id: 'prodigal-son',
      icon: '🏠',
      name: '浪子回頭',
      nameCN: '浪子回頭',
      nameEN: 'Prodigal Son',
      desc: '一個儿子浪費金錢後回家，父親歡喜接納...',
      descCN: '一個兒子浪費金錢後回家，父親歡喜接納...',
      descEN: 'A son wasted his money but returned home, and his father welcomed him joyfully...',
      page: '#',
      available: false
    }
  ]
};

// State
let currentLang = 'zhHK';
let isOldTestamentExpanded = true;
let selectedStory = null;

// Translations
const langNames = {
  oldTestament: { zhHK: '舊約聖經', zhCN: '旧约圣经', en: 'Old Testament' },
  newTestament: { zhHK: '新約聖經', zhCN: '新约圣经', en: 'New Testament' },
  subtitle: {
    oldTestament: { zhHK: '創世記、出埃及記...', zhCN: '创世纪、出埃及记...', en: 'Genesis, Exodus...' },
    newTestament: { zhHK: '福音書、書信...', zhCN: '福音书、书信...', en: 'Gospels, Epistles...' }
  },
  enter: { zhHK: '進入遊戲 ▶', zhCN: '进入游戏 ▶', en: 'Enter Game ▶' }
};

// Initialize
function init() {
  renderStories();
}

// Render stories in grids
function renderStories() {
  const oldGrid = document.getElementById('old-stories-grid');
  const newGrid = document.getElementById('new-stories-grid');
  const oldList = document.getElementById('old-stories-list');
  const newToggles = document.getElementById('new-toggles');
  
  // Old Testament Grid
  oldGrid.innerHTML = stories.oldTestament.map(story => `
    <div class="story-card ${story.available ? '' : 'disabled'}" 
         data-id="${story.id}"
         onclick="selectStory('old', '${story.id}')">
      ${story.iconImg ? `<img src="${story.iconImg}" class="story-icon-img" alt="${story.name}" style="width:60px;height:60px;border-radius:12px;object-fit:contain;">` : `<span class="story-icon">${story.icon}</span>`}
      <div class="story-name">${story.name}</div>
      <div class="story-desc">${story.available ? '✅ 可遊玩' : '🚧 準備中'}</div>
    </div>
  `).join('');
  
  // New Testament Grid
  newGrid.innerHTML = stories.newTestament.map(story => `
    <div class="story-card ${story.available ? '' : 'disabled'}" 
         data-id="${story.id}"
         onclick="selectStory('new', '${story.id}')">
      <span class="story-icon">${story.icon}</span>
      <div class="story-name">${story.name}</div>
      <div class="story-desc">${story.available ? '✅ 可遊玩' : '🚧 準備中'}</div>
    </div>
  `).join('');
  
  // Old Testament Collapsed List
  oldList.innerHTML = stories.oldTestament.map(story => `
    <div class="story-list-item" onclick="selectStory('old', '${story.id}')">
      <div class="list-icon">${story.icon}</div>
      <div class="list-name">${story.name}</div>
    </div>
  `).join('');
  
  // New Testament Collapsed Toggles
  newToggles.innerHTML = stories.newTestament.map(story => `
    <div class="toggle-btn" onclick="selectStory('new', '${story.id}')">
      <div class="toggle-icon">${story.icon}</div>
      <div class="toggle-name">${story.name}</div>
    </div>
  `).join('');
}

// Select story
function selectStory(testament, storyId) {
  const storyList = testament === 'old' ? stories.oldTestament : stories.newTestament;
  const story = storyList.find(s => s.id === storyId);
  if (!story) return;
  
  selectedStory = story;
  
  // Update preview content
  const previewIcon = document.getElementById('preview-icon');
  if (story.iconImg) {
    previewIcon.innerHTML = `<img src="${story.iconImg}" style="width:80px;height:80px;border-radius:16px;object-fit:contain;" alt="${story.name}">`;
  } else {
    previewIcon.textContent = story.icon;
  }
  document.getElementById('preview-title').textContent = story.name;
  document.getElementById('preview-desc').textContent = story.desc;
  
  // Update enter button
  const enterBtn = document.getElementById('enter-btn');
  if (story.available) {
    enterBtn.textContent = '進入遊戲 ▶';
    enterBtn.style.opacity = '1';
    enterBtn.onclick = () => enterStory();
  } else {
    enterBtn.textContent = '🚧 準備中...';
    enterBtn.style.opacity = '0.5';
    enterBtn.onclick = null;
  }
  
  // Show preview
  document.getElementById('overlay').classList.add('show');
  document.getElementById('story-preview').classList.add('show');
  
  // Update card selection
  document.querySelectorAll('.story-card').forEach(card => card.classList.remove('selected'));
  // Also clear from list/toggle items
  document.querySelectorAll('.story-list-item, .toggle-btn').forEach(el => el.classList.remove('selected'));
  // Find the clicked element safely
  const clicked = event?.currentTarget;
  if (clicked) clicked.classList.add('selected');
  // Highlight matching card in grid
  const cardEl = document.querySelector(`.story-card[data-id="${storyId}"]`);
  if (cardEl) cardEl.classList.add('selected');
}

// Close preview
function closePreview() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('story-preview').classList.remove('show');
  document.querySelectorAll('.story-card').forEach(card => card.classList.remove('selected'));
  selectedStory = null;
}

// Enter story
function enterStory() {
  if (!selectedStory || !selectedStory.available) return;
  window.location.href = selectedStory.page;
}

// Toggle testaments
function toggleTestaments() {
  isOldTestamentExpanded = !isOldTestamentExpanded;
  
  const oldTestament = document.getElementById('old-testament');
  const newTestament = document.getElementById('new-testament');
  const divider = document.getElementById('divider');
  
  if (isOldTestamentExpanded) {
    oldTestament.classList.remove('collapsed');
    newTestament.classList.remove('collapsed');
    divider.style.flex = '0 0 4px';
  } else {
    // Show new testament (75%), collapse old testament (25%)
    newTestament.classList.remove('collapsed');
    oldTestament.classList.add('collapsed');
  }
}

// Language toggle
function toggleLang() {
  const menu = document.getElementById('lang-menu');
  menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('lang-menu').style.display = 'none';
  document.querySelector('.nav-btn').textContent = lang === 'zhHK' ? '🌐 粵' : lang === 'zhCN' ? '🌐 簡' : '🌐 EN';
  
  // Update section titles
  document.querySelector('#old-testament .section-title h2').textContent = langNames.oldTestament[lang];
  document.querySelector('#old-testament .section-title span').textContent = langNames.subtitle.oldTestament[lang];
  document.querySelector('#new-testament .section-title h2').textContent = langNames.newTestament[lang];
  document.querySelector('#new-testament .section-title span').textContent = langNames.subtitle.newTestament[lang];
  
  // Re-render stories
  renderStories();
}

// Start
init();
</script>
</body>
</html>
