<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌟 晞霖學習網站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: "Comic Sans MS", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #FFE4B5 0%, #87CEEB 100%);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        
        /* iPad 橫置優化 */
        @media (orientation: landscape) and (max-height: 600px) {
            body { padding: 10px; }
            .title { font-size: 24px !important; margin-bottom: 5px !important; }
            .menu-title { font-size: 20px !important; padding: 8px 15px !important; margin: 8px 0 !important; }
            .category-btn { padding: 12px !important; font-size: 18px !important; }
            .game-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
        }
        
        .menu { padding: 20px; min-height: 100vh; }
        
        .title { font-size: 36px; color: #FF6F61; text-align: center; margin-bottom: 20px; text-shadow: 2px 2px white; }
        
        /* 分類按鈕 */
        .category-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .category-btn {
            flex: 1;
            max-width: 180px;
            padding: 20px 15px;
            border-radius: 25px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .category-btn:active { transform: scale(0.95); }
        
        .category-btn.chinese { background: #FFB6C1; color: #8B4513; }
        .category-btn.math { background: #87CEEB; color: #4169E1; }
        
        /* 遊戲內容 */
        .content-area { display: none; }
        .content-area.active { display: block; }
        
        .menu-title {
            font-size: 28px;
            color: #5D4037;
            text-align: center;
            background: rgba(255,255,255,0.8);
            padding: 12px;
            border-radius: 15px;
            margin: 15px 0;
        }
        
        .back-btn {
            position: fixed;
            top: 15px; left: 15px;
            padding: 10px 20px;
            background: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }
        
        /* 遊戲格 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .game-btn {
            background: white;
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        
        .game-btn:active { transform: scale(0.95); }
        .game-btn.pink { color: #E91E63; border: 3px solid #E91E63; }
        .game-btn.blue { color: #2196F3; border: 3px solid #2196F3; }
        
        /* 寫字遊戲 - 男/女 */
        .writing-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .character-display {
            font-size: 120px;
            margin: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .character-display:active { transform: scale(1.1); }
        
        /* 畫畫遊戲 */
        .shape-game {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 450px;
            margin: 20px auto;
        }
        
        .shape-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .shape-card:active { transform: scale(0.95); }
        
        .shape-icon { font-size: 50px; }
        .shape-name { font-size: 20px; color: #5D4037; margin-top: 5px; }
        
        /* 大與小 - 圈起遊戲 */
        .size-game {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
        }
        
        .size-item {
            font-size: 40px;
            padding: 15px;
            cursor: crosshair;
            border-radius: 10px;
            transition: background 0.3s;
        }
        
        .size-item.selected {
            background: rgba(255, 235, 59, 0.5);
            outline: 3px dashed red;
        }
        
        .size-hint {
            text-align: center;
            font-size: 18px;
            color: #5D4037;
            margin-bottom: 15px;
        }
        
        /* 男女配對 - 拖拉遊戲 */
        .match-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .drop-zone {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .drop-area {
            width: 120px;
            height: 120px;
            border: 3px dashed #ccc;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: rgba(255,255,255,0.5);
        }
        
        .drag-area {
            display: flex;
            gap: 20px;
        }
        
        .drag-item {
            font-size: 50px;
            cursor: grab;
            padding: 10px;
            transition: transform 0.2s;
        }
        
        .drag-item:active { cursor: grabbing; transform: scale(1.1); }
        
        .drag-item.dragging { opacity: 0.5; }
        
        .drop-area.drag-over {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.2);
        }
        
        /* 表揚 */
        .celebration {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .celebration.show { display: flex; }
        
        .celebration-text {
            font-size: 60px;
            color: #FFD700;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .celebration-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 主頁面 -->
    <div class="menu">
        <h1 class="title">🌟 晞霖學習網站 🌟</h1>
        
        <div class="category-container">
            <button class="category-btn chinese" onclick="showCategory('chinese')">
                📖 語文
            </button>
            <button class="category-btn math" onclick="showCategory('math')">
                🔢 數學
            </button>
        </div>
    </div>
    
    <!-- 語文內容 -->
    <div id="chinese-content" class="content-area">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="menu-title">📖 語文</h2>
        
        <div class="game-grid">
            <div class="game-btn pink" onclick="showGame('write-male')">
                ✍️ 男
            </div>
            <div class="game-btn pink" onclick="showGame('write-female')">
                ✍️ 女
            </div>
            <div class="game-btn pink" onclick="showGame('match')" style="grid-column: span 2;">
                🔗 男女配對
            </div>
        </div>
    </div>
    
    <!-- 數學內容 -->
    <div id="math-content" class="content-area">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="menu-title">🔢 數學</h2>
        
        <div class="game-grid">
            <div class="game-btn blue" onclick="showGame('shape')">
                ⭕ 畫畫
            </div>
            <div class="game-btn blue" onclick="showGame('size')">
                🔴 大與小
            </div>
        </div>
    </div>
    
    <!-- 寫字遊戲 - 男 -->
    <div id="write-male" class="content-area">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="menu-title">👦 寫「男」字</h2>
        <div class="writing-area">
            <div class="character-display" onclick="showCelebration()">男</div>
            <p style="font-size:18px;color:#5D4037;">點擊睇寫法</p>
        </div>
    </div>
    
    <!-- 寫字遊戲 - 女 -->
    <div id="write-female" class="content-area">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="menu-title">👧 寫「女」字</h2>
        <div class="writing-area">
            <div class="character-display" onclick="showCelebration()">女</div>
            <p style="font-size:18px;color:#5D4037;">點擊睇寫法</p>
        </div>
    </div>
    
    <!-- 畫畫遊戲 -->
    <div id="shape" class="content-area">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="menu-title">⭕ 畫畫</h2>
        <div class="shape-game">
            <div class="shape-card" onclick="showCelebration()">
                <div class="shape-icon">⭕</div>
                <div class="shape-name">圓形</div>
            </div>
            <div class="shape-card" onclick="showCelebration()">
                <div class="shape-icon">🟥</div>
                <div class="shape-name">方形</div>
            </div>
            <div class="shape-card" onclick="showCelebration()">
                <div class="shape-icon">🔺</div>
                <div class="shape-name">三角形</div>
            </div>
        </div>
    </div>
    
    <!-- 大與小遊戲 -->
    <div id="size" class="content-area">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="menu-title">🔴 大與小</h2>
        <p class="size-hint">圈起最大既嘢</p>
        <div class="size-game" id="size-game-area">
            <div class="size-item" style="font-size:30px;" onclick="selectSize(this)">🐘</div>
            <div class="size-item" style="font-size:60px;" onclick="selectSize(this)">🐘</div>
            <div class="size-item" style="font-size:45px;" onclick="selectSize(this)">🐘</div>
            <div class="size-item" style="font-size:25px;" onclick="selectSize(this)">🐘</div>
            <div class="size-item" style="font-size:50px;" onclick="selectSize(this)">🐘</div>
            <div class="size-item" style="font-size:35px;" onclick="selectSize(this)">🐘</div>
        </div>
    </div>
    
    <!-- 男女配對遊戲 -->
    <div id="match" class="content-area">
        <button class="back-btn" onclick="goBack()">🔙 返回</button>
        <h2 class="menu-title">👦👧 男女配對</h2>
        <p class="size-hint">將啱既字卡拖過去</p>
        <div class="match-game">
            <div class="drop-zone">
                <div class="drop-area" data-gender="male" 
                     ondragover="handleDragOver(event)" 
                     ondragleave="handleDragLeave(event)"
                     ondrop="handleDrop(event)">
                    👦男
                </div>
                <div class="drop-area" data-gender="female"
                     ondragover="handleDragOver(event)" 
                     ondragleave="handleDragLeave(event)"
                     ondrop="handleDrop(event)">
                    👧女
                </div>
            </div>
            <div class="drag-area">
                <div class="drag-item" draggable="true" data-gender="female" 
                     ondragstart="handleDragStart(event)" 
                     ondragend="handleDragEnd(event)">
                    👧
                </div>
                <div class="drag-item" draggable="true" data-gender="male"
                     ondragstart="handleDragStart(event)" 
                     ondragend="handleDragEnd(event)">
                    👦
                </div>
                <div class="drag-item" draggable="true" data-gender="female"
                     ondragstart="handleDragStart(event)" 
                     ondragend="handleDragEnd(event)">
                    👧
                </div>
                <div class="drag-item" draggable="true" data-gender="male"
                     ondragstart="handleDragStart(event)" 
                     ondragend="handleDragEnd(event)">
                    👦
                </div>
            </div>
        </div>
    </div>
    
    <!-- 表揚畫面 -->
    <div id="celebration" class="celebration" onclick="hideCelebration()">
        <div class="celebration-text">🎉 你叻晒！ 🎉</div>
        <button class="celebration-btn" onclick="event.stopPropagation();hideCelebration();goBack();">再玩過</button>
    </div>
    
    <script>
        let currentCategory = '';
        let selectedSize = null;
        
        function showCategory(cat) {
            document.querySelector('.menu').style.display = 'none';
            document.getElementById(cat + '-content').classList.add('active');
            currentCategory = cat;
        }
        
        function showGame(game) {
            document.getElementById(currentCategory + '-content').style.display = 'none';
            document.getElementById(game).classList.add('active');
        }
        
        function goBack() {
            // Hide all content areas
            document.querySelectorAll('.content-area').forEach(el => {
                el.classList.remove('active');
            });
            // Show menu
            document.querySelector('.menu').style.display = 'block';
            currentCategory = '';
        }
        
        function selectSize(el) {
            // 圈起功能 - 切換選中狀態
            if (selectedSize) {
                selectedSize.classList.remove('selected');
            }
            el.classList.add('selected');
            selectedSize = el;
            
            // 檢查是否最大 (60px)
            if (el.style.fontSize === '60px') {
                setTimeout(showCelebration, 500);
            }
        }
        
        function showCelebration() {
            document.getElementById('celebration').classList.add('show');
        }
        
        function hideCelebration() {
            document.getElementById('celebration').classList.remove('show');
            // 重置選擇
            if (selectedSize) {
                selectedSize.classList.remove('selected');
                selectedSize = null;
            }
        }
        
        // 拖拉功能 - 男女配對
        let draggedItem = null;
        
        function handleDragStart(e) {
            draggedItem = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }
        
        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            draggedItem = null;
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }
        
        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }
        
        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            if (draggedItem) {
                // 檢查是否正確配對
                const targetGender = e.currentTarget.dataset.gender;
                const draggedGender = draggedItem.dataset.gender;
                
                if (targetGender === draggedGender) {
                    // 正確配對
                    e.currentTarget.innerHTML = draggedItem.innerHTML;
                    checkAllMatched();
                } else {
                    // 錯誤 - 震動提示
                    e.currentTarget.style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        e.currentTarget.style.animation = '';
                    }, 500);
                }
            }
        }
        
        function checkAllMatched() {
            const drops = document.querySelectorAll('.drop-area[data-gender]');
            let allMatched = true;
            drops.forEach(d => {
                if (!d.querySelector('.drag-item')) allMatched = false;
            });
            if (allMatched) showCelebration();
        }
        
        // 添加shake動畫
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
