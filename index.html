<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>幼兒學習 📚</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: "Comic Sans MS", "Helvetica Neue", sans-serif;
            background: linear-gradient(180deg, #FFF8E1 0%, #E8F5E9 50%, #E3F2FD 100%);
            min-height: 100vh;
            overflow-y: auto;
            touch-action: pan-y;
            user-select: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 15px 80px;
            min-height: 100vh;
        }
        
        .title { font-size: 32px; color: #5D4037; margin-bottom: 5px; text-align: center; }
        .subtitle { font-size: 18px; color: #8D6E63; margin-bottom: 25px; }
        
        .section-title { font-size: 24px; color: #5D4037; margin: 20px 0 12px; }
        
        .activities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            max-width: 400px;
            width: 100%;
        }
        
        .activity-card {
            background: white;
            border-radius: 18px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .activity-card:active { transform: scale(0.95); }
        .activity-card.shapes { border: 3px solid #E91E63; }
        .activity-card.gender { border: 3px solid #9C27B0; }
        .activity-card.numbers { border: 3px solid #2196F3; }
        .activity-card.colors { border: 3px solid #4CAF50; }
        .activity-card.size { border: 3px solid #00BCD4; }
        
        .activity-icon { font-size: 42px; margin-bottom: 6px; }
        .activity-name { font-size: 20px; font-weight: bold; }
        
        .activity-card.shapes .activity-name { color: #E91E63; }
        .activity-card.gender .activity-name { color: #9C27B0; }
        .activity-card.numbers .activity-name { color: #2196F3; }
        .activity-card.colors .activity-name { color: #4CAF50; }
        .activity-card.size .activity-name { color: #00BCD4; }
        
        /* Pages */
        .activity-page {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px 80px;
            min-height: 100vh;
        }
        
        .activity-page.active { display: flex; }
        .page-title { font-size: 28px; color: #5D4037; margin-bottom: 15px; }
        
        .back-btn {
            position: fixed;
            top: 12px; left: 12px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 22px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 50;
        }
        
        /* Shapes */
        .shapes-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 380px;
        }
        
        .shape-btn {
            background: white;
            border-radius: 14px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            transition: transform 0.15s;
        }
        
        .shape-btn:active { transform: scale(0.95); }
        .shape-icon { font-size: 38px; }
        .shape-label { font-size: 18px; font-weight: bold; margin-top: 5px; }
        
        .canvas-area {
            position: relative;
            width: 85vmin;
            height: 50vmin;
            max-width: 350px;
            max-height: 280px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            overflow: hidden;
            margin-top: 15px;
        }
        
        #drawCanvas { position: absolute; width: 100%; height: 100%; touch-action: none; }
        .draw-hint { font-size: 14px; color: #999; margin-top: 10px; }
        
        .draw-btns { display: flex; gap: 10px; margin-top: 12px; }
        
        .btn {
            padding: 10px 22px;
            font-size: 14px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.15s;
        }
        
        .btn:active { transform: scale(0.93); }
        .btn-orange { background: #FF7043; color: white; }
        .btn-green { background: #66BB6A; color: white; }
        
        /* Gender */
        .gender-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        
        .person-row {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 18px;
            padding: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }
        
        .person-img {
            width: 70px; height: 70px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px;
            background: #F5F5F5;
            border-radius: 50%;
        }
        
        .person-info { flex: 1; margin-left: 14px; }
        .person-name { font-size: 22px; font-weight: bold; color: #5D4037; }
        .person-sentence { font-size: 16px; color: #888; margin-top: 3px; }
        
        .drop-zone {
            display: inline-block;
            width: 38px; height: 32px;
            border: 3px dashed #BBB;
            border-radius: 6px;
            text-align: center;
            font-size: 22px;
            line-height: 28px;
            background: #FAFAFA;
            margin: 0 2px;
            cursor: pointer;
            vertical-align: middle;
        }
        
        .drop-zone.correct { border-color: #4CAF50; background: #E8F5E9; }
        .drop-zone.wrong { border-color: #F44336; background: #FFEBEE; }
        
        .sticker-container {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-top: 18px;
            padding: 18px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
        }
        
        .sticker {
            width: 58px; height: 58px;
            background: linear-gradient(135deg, #FFEB3B 0%, #FFC107 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold;
            color: #5D4037;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(255,193,7,0.4);
            transition: transform 0.15s;
        }
        
        .sticker:active { transform: scale(1.1); }
        
        /* Numbers */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 360px;
        }
        
        .number-btn {
            background: white;
            border-radius: 12px;
            padding: 15px 6px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.15s;
        }
        
        .number-btn:active { transform: scale(0.95); }
        .number-btn .num { font-size: 28px; font-weight: bold; color: #2196F3; }
        .number-btn .count { font-size: 20px; margin-top: 3px; }
        
        #numberDisplay { margin-top: 20px; font-size: 60px; color: #2196F3; }
        
        /* Colors */
        .colors-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 320px;
        }
        
        .color-btn {
            border-radius: 14px;
            padding: 22px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            transition: transform 0.15s;
        }
        
        .color-btn:active { transform: scale(0.95); }
        .color-btn .icon { font-size: 38px; }
        .color-btn .name { font-size: 20px; font-weight: bold; margin-top: 6px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        
        #colorResult { margin-top: 20px; font-size: 32px; color: #5D4037; }
        
        /* Size */
        .size-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .size-row { display: flex; gap: 20px; align-items: flex-end; }
        
        .size-item {
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: transform 0.15s;
        }
        
        .size-item:active { transform: scale(0.95); }
        .size-item .icon { font-size: 48px; }
        .size-item .label { font-size: 18px; font-weight: bold; margin-top: 5px; color: #5D4037; }
        
        #sizeResult { margin-top: 18px; font-size: 28px; }
        
        /* Celebration */
        .celebration {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.97);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .celebration.show { display: flex; animation: popIn 0.4s; }
        @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .celebration-emoji { font-size: 85px; animation: bounce 0.8s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
        
        .celebration-text { font-size: 30px; color: #4CAF50; margin: 14px 0 22px; text-align: center; }
        .celebration-btns { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <!-- Main Menu -->
    <div class="menu" id="menu">
        <div class="title">📚 學習時間</div>
        <div class="subtitle">你想玩咩呀？</div>
        
        <div class="section-title">👶 幼兒語文</div>
        <div class="activities-grid">
            <div class="activity-card shapes" onclick="goTo('shapes')">
                <div class="activity-icon">🎨</div>
                <div class="activity-name">畫畫</div>
            </div>
            <div class="activity-card gender" onclick="goTo('gender')">
                <div class="activity-icon">👦👧</div>
                <div class="activity-name">男仔女仔</div>
            </div>
        </div>
        
        <div class="section-title">🔢 幼兒數學</div>
        <div class="activities-grid">
            <div class="activity-card numbers" onclick="goTo('numbers')">
                <div class="activity-icon">1️⃣2️⃣3️⃣</div>
                <div class="activity-name">數字</div>
            </div>
            <div class="activity-card colors" onclick="goTo('colors')">
                <div class="activity-icon">🎨</div>
                <div class="activity-name">顏色</div>
            </div>
            <div class="activity-card size" onclick="goTo('size')">
                <div class="activity-icon">🐘🐜</div>
                <div class="activity-name">大與小</div>
            </div>
        </div>
    </div>
    
    <!-- Shapes -->
    <div class="activity-page" id="shapesPage">
        <button class="back-btn" onclick="goBack()">🏠 目錄</button>
        <div class="page-title">🎨 畫畫時間</div>
        
        <div class="shapes-container">
            <div class="shape-btn" onclick="startDraw('circle')">
                <div class="shape-icon">⭕</div>
                <div class="shape-label" style="color:#E91E63">圓形</div>
            </div>
            <div class="shape-btn" onclick="startDraw('square')">
                <div class="shape-icon">⬜</div>
                <div class="shape-label" style="color:#2196F3">正方形</div>
            </div>
            <div class="shape-btn" onclick="startDraw('triangle')">
                <div class="shape-icon">🔺</div>
                <div class="shape-label" style="color:#FF9800">三角形</div>
            </div>
        </div>
        
        <div class="canvas-area" id="drawArea" style="display:none;">
            <canvas id="drawCanvas"></canvas>
        </div>
        <div class="draw-hint" id="drawHint" style="display:none;">用手指跟住灰色線畫 🎯</div>
        
        <div class="draw-btns" id="drawBtns" style="display:none;">
            <button class="btn btn-orange" onclick="clearDraw()">🔄 再畫</button>
            <button class="btn btn-green" onclick="doneDraw()">✅ 完成</button>
        </div>
    </div>
    
    <!-- Gender -->
    <div class="activity-page" id="genderPage">
        <button class="back-btn" onclick="goBack()">🏠 目錄</button>
        <div class="page-title">👦👧 佢係邊個？</div>
        
        <div class="gender-container">
            <div class="person-row">
                <div class="person-img">👧</div>
                <div class="person-info">
                    <div class="person-name">琪琪</div>
                    <div class="person-sentence">我係琪琪。我係<span class="drop-zone" data-answer="女" onclick="tryPlace(this)">[ ]</span>孩子。</div>
                </div>
            </div>
            <div class="person-row">
                <div class="person-img">👦</div>
                <div class="person-info">
                    <div class="person-name">俊俊</div>
                    <div class="person-sentence">我係俊俊。我係<span class="drop-zone" data-answer="男" onclick="tryPlace(this)">[ ]</span>孩子。</div>
                </div>
            </div>
        </div>
        
        <div class="sticker-container">
            <div class="sticker" onclick="selectSticker(this, '男')">男</div>
            <div class="sticker" onclick="selectSticker(this, '女')">女</div>
        </div>
        
        <div class="draw-btns" style="margin-top:18px;">
            <button class="btn btn-orange" onclick="resetGender()">🔄 重做</button>
            <button class="btn btn-green" onclick="checkGender()">✅ 檢查</button>
        </div>
    </div>
    
    <!-- Numbers -->
    <div class="activity-page" id="numbersPage">
        <button class="back-btn" onclick="goBack()">🏠 目錄</button>
        <div class="page-title">1️⃣2️⃣3️⃣ 數字</div>
        
        <div class="numbers-grid">
            <div class="number-btn" onclick="playNumber(1)"><div class="num">1</div><div class="count">一</div></div>
            <div class="number-btn" onclick="playNumber(2)"><div class="num">2</div><div class="count">二</div></div>
            <div class="number-btn" onclick="playNumber(3)"><div class="num">3</div><div class="count">三</div></div>
            <div class="number-btn" onclick="playNumber(4)"><div class="num">4</div><div class="count">四</div></div>
            <div class="number-btn" onclick="playNumber(5)"><div class="num">5</div><div class="count">五</div></div>
            <div class="number-btn" onclick="playNumber(6)"><div class="num">6</div><div class="count">六</div></div>
            <div class="number-btn" onclick="playNumber(7)"><div class="num">7</div><div class="count">七</div></div>
            <div class="number-btn" onclick="playNumber(8)"><div class="num">8</div><div class="count">八</div></div>
            <div class="number-btn" onclick="playNumber(9)"><div class="num">9</div><div class="count">九</div></div>
            <div class="number-btn" onclick="playNumber(10)"><div class="num">10</div><div class="count">十</div></div>
        </div>
        
        <div id="numberDisplay"></div>
    </div>
    
    <!-- Colors -->
    <div class="activity-page" id="colorsPage">
        <button class="back-btn" onclick="goBack()">🏠 目錄</button>
        <div class="page-title">🎨 顏色</div>
        
        <div class="colors-grid">
            <div class="color-btn" style="background:#F44336" onclick="showColor('紅色')">
                <div class="icon">🔴</div>
                <div class="name">紅色</div>
            </div>
            <div class="color-btn" style="background:#2196F3" onclick="showColor('藍色')">
                <div class="icon">🔵</div>
                <div class="name">藍色</div>
            </div>
            <div class="color-btn" style="background:#4CAF50" onclick="showColor('綠色')">
                <div class="icon">🟢</div>
                <div class="name">綠色</div>
            </div>
            <div class="color-btn" style="background:#FFEB3B" onclick="showColor('黃色')">
                <div class="icon">🟡</div>
                <div class="name">黃色</div>
            </div>
            <div class="color-btn" style="background:#FF9800" onclick="showColor('橙色')">
                <div class="icon">🟠</div>
                <div class="name">橙色</div>
            </div>
            <div class="color-btn" style="background:#9C27B0" onclick="showColor('紫色')">
                <div class="icon">🟣</div>
                <div class="name">紫色</div>
            </div>
        </div>
        
        <div id="colorResult"></div>
    </div>
    
    <!-- Size -->
    <div class="activity-page" id="sizePage">
        <button class="back-btn" onclick="goBack()">🏠 目錄</button>
        <div class="page-title">🐘🐜 大與小</div>
        
        <div class="size-container">
            <div class="size-row">
                <div class="size-item" onclick="checkSize('big', this)">
                    <div class="icon">🐘</div>
                    <div class="label">大</div>
                </div>
                <div class="size-item" onclick="checkSize('small', this)">
                    <div class="icon">🐜</div>
                    <div class="label">細</div>
                </div>
            </div>
            <div class="size-row">
                <div class="size-item" onclick="checkSize('big', this)">
                    <div class="icon">🏠</div>
                    <div class="label">大</div>
                </div>
                <div class="size-item" onclick="checkSize('small', this)">
                    <div class="icon">🏡</div>
                    <div class="label">細</div>
                </div>
            </div>
            <div class="size-row">
                <div class="size-item" onclick="checkSize('big', this)">
                    <div class="icon">🌳</div>
                    <div class="label">大</div>
                </div>
                <div class="size-item" onclick="checkSize('small', this)">
                    <div class="icon">🌱</div>
                    <div class="label">細</div>
                </div>
            </div>
        </div>
        
        <div id="sizeResult"></div>
    </div>
    
    <!-- Celebration -->
    <div class="celebration" id="celebration">
        <div class="celebration-emoji">🌟</div>
        <div class="celebration-text" id="celebrationText">你好叻呀！</div>
        <div class="celebration-btns">
            <button class="btn btn-orange" onclick="goBack()">🏠 返去</button>
            <button class="btn btn-green" onclick="retry()">再玩過</button>
        </div>
    </div>

    <script>
        function goTo(page) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById(page + 'Page').classList.add('active');
            if (page === 'numbers') document.getElementById('numberDisplay').textContent = '';
        }
        
        function goBack() {
            document.getElementById('menu').style.display = 'flex';
            document.querySelectorAll('.activity-page').forEach(p => p.classList.remove('active'));
            document.getElementById('celebration').classList.remove('show');
        }
        
        let currentActivity = null;
        
        // Shapes
        let ctx, canvas, isDrawing = false, lastX, lastY;
        
        const shapeData = {
            circle: { color: '#E91E63' },
            square: { color: '#2196F3' },
            triangle: { color: '#FF9800' }
        };
        
        function startDraw(shape) {
            currentActivity = 'draw';
            document.getElementById('drawArea').style.display = 'block';
            document.getElementById('drawHint').style.display = 'block';
            document.getElementById('drawBtns').style.display = 'flex';
            setTimeout(() => initCanvas(shape), 100);
        }
        
        function initCanvas(shape) {
            canvas = document.getElementById('drawCanvas');
            ctx = canvas.getContext('2d');
            const area = canvas.parentElement;
            canvas.width = area.clientWidth;
            canvas.height = area.clientHeight;
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 12;
            ctx.strokeStyle = shapeData[shape].color;
            
            ctx.setLineDash([18, 14]);
            ctx.lineWidth = 8;
            ctx.strokeStyle = '#EEEEEE';
            
            const w = canvas.width, h = canvas.height, cx = w/2, cy = h/2, r = Math.min(w,h) * 0.35;
            
            if (shape === 'circle') { ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke(); }
            else if (shape === 'square') { const s = r * 1.8; ctx.strokeRect(cx-s/2, cy-s/2, s, s); }
            else if (shape === 'triangle') { const s = r * 2, hi = s * 0.866; ctx.beginPath(); ctx.moveTo(cx, cy - hi/2); ctx.lineTo(cx - s/2, cy + hi/2); ctx.lineTo(cx + s/2, cy + hi/2); ctx.closePath(); ctx.stroke(); }
            
            ctx.setLineDash([]);
            ctx.lineWidth = 12;
            ctx.strokeStyle = shapeData[shape].color;
            
            canvas.ontouchstart = (e) => { e.preventDefault(); start(e); };
            canvas.ontouchmove = (e) => { e.preventDefault(); move(e); };
            canvas.ontouchend = () => isDrawing = false;
            canvas.onmousedown = start;
            canvas.onmousemove = move;
            canvas.onmouseup = canvas.onmouseleave = () => isDrawing = false;
        }
        
        function start(e) {
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x; lastY = pos.y;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 6, 0, Math.PI*2);
            ctx.fill();
        }
        
        function move(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x; lastY = pos.y;
        }
        
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            let x = e.touches ? e.touches[0].clientX : e.clientX;
            let y = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: x - r.left, y: y - r.top };
        }
        
        function clearDraw() { initCanvas('circle'); }
        function doneDraw() { showCelebration('畫得好靚呀！'); }
        
        // Gender
        let selectedSticker = null;
        
        function selectSticker(el, value) {
            document.querySelectorAll('.sticker').forEach(s => s.style.transform = 'scale(1)');
            el.style.transform = 'scale(1.15)';
            selectedSticker = value;
        }
        
        function tryPlace(zone) {
            if (selectedSticker) {
                zone.textContent = selectedSticker;
                zone.style.borderColor = '#9C27B0';
                zone.style.background = '#F3E5F5';
            }
        }
        
        function resetGender() {
            document.querySelectorAll('.drop-zone').forEach(z => {
                z.textContent = '';
                z.classList.remove('correct', 'wrong');
                z.style.borderColor = '#BBB';
                z.style.background = '#FAFAFA';
            });
            selectedSticker = null;
            document.querySelectorAll('.sticker').forEach(s => s.style.transform = '');
        }
        
        function checkGender() {
            let correct = 0;
            document.querySelectorAll('.drop-zone').forEach(z => {
                const ans = z.getAttribute('data-answer');
                const val = z.textContent;
                if (val === ans) { z.classList.add('correct'); z.classList.remove('wrong'); correct++; }
                else { z.classList.add('wrong'); z.classList.remove('correct'); }
            });
            if (correct === 2) showCelebration('你好叻呀！');
        }
        
        // Numbers
        const chineseNumbers = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
        function playNumber(n) { document.getElementById('numberDisplay').textContent = chineseNumbers[n] + ' (' + n + ')'; }
        
        // Colors
        function showColor(name) { document.getElementById('colorResult').textContent = name + '！'; }
        
        // Size
        function checkSize(choice, el) {
            const correct = ['big', 'small', 'big'][Math.floor(Math.random() * 3)];
            const result = document.getElementById('sizeResult');
            if (choice === correct) {
                el.style.background = '#C8E6C9';
                result.style.color = '#4CAF50';
                result.textContent = '啱啦！';
                setTimeout(() => showCelebration('你好叻呀！'), 500);
            } else {
                el.style.background = '#FFCDD2';
                result.style.color = '#F44336';
                result.textContent = '再試過！';
            }
        }
        
        // Celebration
        function showCelebration(text) {
            document.getElementById('celebrationText').textContent = text;
            document.getElementById('celebration').classList.add('show');
        }
        
        function retry() {
            document.getElementById('celebration').classList.remove('show');
            if (currentActivity === 'draw') {
                document.getElementById('drawArea').style.display = 'none';
                document.getElementById('drawHint').style.display = 'none';
                document.getElementById('drawBtns').style.display = 'none';
            } else { resetGender(); }
        }
    </script>
</body>
</html>
